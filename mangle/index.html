<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mangle</title>
  <style>
    :root {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #e8e8e8;
    }
    body {
      max-width: 36rem;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-weight: 600; font-size: 1.25rem; letter-spacing: 0.02em; }
    #status { font-size: 0.9rem; opacity: 0.85; margin: 0.75rem 0 1.25rem; }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    button {
      font: inherit;
      padding: 0.5rem 0.9rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #222;
      color: #eee;
      cursor: pointer;
    }
    button:hover { background: #2a2a2a; }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.recording {
      background: #5a1a1a;
      border-color: #a33;
    }
    .hint {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 0.75rem;
    }
    input[type="file"] { font-size: 0.8rem; max-width: 100%; }
    label.file {
      font-size: 0.85rem;
      display: inline-block;
      padding: 0.4rem 0.75rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #222;
      cursor: pointer;
    }
    label.file:hover { background: #2a2a2a; }
    label.file input { display: none; }
    .bank-row {
      margin-top: 0.75rem;
    }
    .bank-row label { font-size: 0.85rem; display: block; margin-bottom: 0.35rem; opacity: 0.9; }
    #sample-bank {
      width: 100%;
      max-width: 100%;
      font: inherit;
      padding: 0.45rem 0.5rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #222;
      color: #eee;
    }
    #sample-bank:disabled { opacity: 0.5; }
    .nav { font-size: 0.85rem; margin-bottom: 1rem; }
    .nav a { color: #8cf; }
  </style>
</head>
<body>
  <p class="nav"><a href="audition.html">Sample audition</a></p>
  <h1>Mangle</h1>
  <p id="status">Press <strong>Start</strong> once (browsers require a click before audio).</p>

  <div class="row">
    <button type="button" id="btn-start">Start</button>
    <button type="button" id="btn-pause" disabled>Pause</button>
    <button type="button" id="btn-stop" disabled>Stop</button>
    <button type="button" id="btn-record">Record</button>
  </div>

  <p class="hint">
    <strong>Load folder</strong> (all audio in that folder) —
    <label class="file">
      Choose folder
      <input type="file" id="sample-folder" webkitdirectory multiple />
    </label>
  </p>
  <p class="hint">
    Or <strong>one file</strong> —
    <input type="file" id="sample-file" accept="audio/*" />
  </p>

  <div class="bank-row">
    <label for="sample-bank">Looping sample</label>
    <select id="sample-bank" disabled aria-label="Which sample to loop">
      <option value="">— Load a folder or file —</option>
    </select>
  </div>

  <script src="vendor/Tone.js"></script>
  <script src="app.js"></script>
</body>
</html>
