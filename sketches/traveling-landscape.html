<body>
<div id="label">Traveling Landscape &nbsp;·&nbsp; Mark Walhimer</div>

<script>
"use strict";

// ── EMERGENT DNA ─────────────────────────────────────────────────────────────
// The lifecycle system. Artwork-agnostic.

class Rand {
  constructor(seed) { this.s = seed || 1; }
  next() {
    const x = Math.sin(this.s++) * 10000;
    return x - Math.floor(x);
  }
  range(a, b) { return a + this.next() * (b - a); }
  pick(arr)   { return arr[Math.floor(this.next() * arr.length)]; }
}

class Entity {
  constructor(rng, x, z, colorSet) {

    // ── position in landscape ──
    this.x = x;
    this.z = z;

    // ── artwork properties (box dimensions) ──
    this.w = rng.range(300, 900);
    this.h = rng.range(600, 2400);
    this.d = rng.range(300, 900);

    this.colorSet   = colorSet;
    this.breathAmp  = rng.range(0.015, 0.06);
    this.breathPhase = rng.range(0, Math.PI * 2);

    // ── lifecycle DNA ──
    this.totalLife = rng.range(18000, 55000);
    this.growDur   = this.totalLife * rng.range(0.18, 0.32);
    this.fadeDur   = this.totalLife * rng.range(0.20, 0.35);
    this.holdDur   = this.totalLife - this.growDur - this.fadeDur;

    this.born = -1;
    this.dead = false;
  }

  // 0 → 1 → 1 → 0  over the entity's lifetime
  envelope(elapsed) {
    if (elapsed < this.growDur) {
      return this._ease(elapsed / this.growDur);
    } else if (elapsed < this.growDur + this.holdDur) {
      return 1.0;
    } else {
      const f = (elapsed - this.growDur - this.holdDur) / this.fadeDur;
      return 1.0 - this._ease(Math.min(f, 1.0));
    }
  }

  _ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  // ── ARTWORK: box grows from ground, breathes at peak, returns to white ──
  draw(t) {
    if (this.born < 0) this.born = t;
    const elapsed = t - this.born;
    if (elapsed > this.totalLife) { this.dead = true; return; }

    const env    = this.envelope(elapsed);
    const breath = 1.0 + this.breathAmp * sin(t * 0.0008 + this.breathPhase) * env;
    const scaleH = env * breath;
    const alpha  = env * 190;

    if (alpha < 2) return;

    const c1 = color(
      hue(this.colorSet[0]),
      saturation(this.colorSet[0]),
      brightness(this.colorSet[0]),
      alpha
    );
    const c2 = color(
      hue(this.colorSet[1]),
      saturation(this.colorSet[1]),
      brightness(this.colorSet[1]),
      alpha * 0.5
    );

    push();
    // box base sits on ground (y=0), grows upward (negative y)
    translate(this.x, -(this.h * scaleH) / 2, this.z);
    scale(1, scaleH, 1);
    drawBox(this.w, this.h, this.d, c1, c2);
    pop();
  }
}

// ── ARTWORK: gradient box faces ──────────────────────────────────────────────

function drawBox(w, h, d, c1, c2) {
  noStroke();
  // front
  beginShape();
  fill(c1); vertex(-w/2, -h/2,  d/2);
  fill(c2); vertex( w/2, -h/2,  d/2);
            vertex( w/2,  h/2,  d/2);
            vertex(-w/2,  h/2,  d/2);
  endShape(CLOSE);
  // back
  beginShape();
  fill(c2); vertex(-w/2, -h/2, -d/2);
  fill(c1); vertex( w/2, -h/2, -d/2);
            vertex( w/2,  h/2, -d/2);
            vertex(-w/2,  h/2, -d/2);
  endShape(CLOSE);
  // left
  beginShape();
  fill(c1); vertex(-w/2, -h/2,  d/2);
            vertex(-w/2,  h/2,  d/2);
  fill(c2); vertex(-w/2,  h/2, -d/2);
            vertex(-w/2, -h/2, -d/2);
  endShape(CLOSE);
  // right
  beginShape();
  fill(c2); vertex( w/2, -h/2,  d/2);
            vertex( w/2,  h/2,  d/2);
  fill(c1); vertex( w/2,  h/2, -d/2);
            vertex( w/2, -h/2, -d/2);
  endShape(CLOSE);
  // top
  beginShape();
  fill(c1); vertex(-w/2, -h/2,  d/2);
            vertex( w/2, -h/2,  d/2);
  fill(c2); vertex( w/2, -h/2, -d/2);
            vertex(-w/2, -h/2, -d/2);
  endShape(CLOSE);
}

// ── WORLD / SPAWN SYSTEM ─────────────────────────────────────────────────────

let entities   = [];
let rng;
let camZ       = 0;
let worldBorn;
let worldLife;
let cycleCount = 0;
let palette;

const TRAVEL_SPEED    = 2.2;
const MAX_Z           = 22000;
const CLUSTER_COUNT   = 9;
const CLUSTER_SIZE_MIN = 4;
const CLUSTER_SIZE_MAX = 14;
const LONERS           = 18;

function buildPalette(rng) {
  // vivid hues that fade to white via alpha — each cycle gets a fresh variation
  const shift = rng.range(0, 60);
  return [
    [color((55  + shift) % 360, 100, 100, 60), color((40  + shift) % 360, 100, 100, 30)],
    [color((  0 + shift) % 360,   0, 100, 25), color((55  + shift) % 360,  80, 100, 40)],
    [color((320 + shift) % 360, 100, 100, 60), color((350 + shift) % 360, 100, 100, 30)],
    [color((200 + shift) % 360, 100, 100, 50), color((220 + shift) % 360, 100, 100, 30)]
  ];
}

function initWorld() {
  colorMode(HSB, 360, 100, 100, 255);
  rng       = new Rand(Date.now() % 99999);
  entities  = [];
  camZ      = 0;
  worldBorn = millis();
  worldLife = rng.range(150000, 240000); // ~2.5 – 4 min
  palette   = buildPalette(rng);

  // clusters scattered through the landscape
  for (let c = 0; c < CLUSTER_COUNT; c++) {
    const cx    = rng.range(-3500, 3500);
    const cz    = rng.range(-MAX_Z + 1000, -1200);
    const count = Math.floor(rng.range(CLUSTER_SIZE_MIN, CLUSTER_SIZE_MAX));
    for (let i = 0; i < count; i++) {
      entities.push(new Entity(
        rng,
        cx + rng.range(-2000, 2000),
        cz + rng.range(-2500, 2500),
        rng.pick(palette)
      ));
    }
  }

  // lone sentinels
  for (let i = 0; i < LONERS; i++) {
    entities.push(new Entity(
      rng,
      rng.range(-5000, 5000),
      rng.range(-MAX_Z, -800),
      rng.pick(palette)
    ));
  }
}

// ── SKETCH ───────────────────────────────────────────────────────────────────

function setup() {
  pixelDensity(Math.min(window.devicePixelRatio, 2));
  createCanvas(windowWidth, windowHeight, WEBGL);
  frameRate(60);
  colorMode(HSB, 360, 100, 100, 255);
  setAttributes('alpha', true);
  initWorld();
}

function draw() {
  background(0, 0, 100); // pure white

  const t            = millis();
  const worldElapsed = t - worldBorn;

  // ── camera movement ──
  camZ -= TRAVEL_SPEED;

  const bob  = sin(frameCount * 0.010) * 50;
  const sway = sin(frameCount * 0.007) * 280;

  // camera height sits just above the ground plane (y = -180)
  camera(
    sway,       -180 + bob, camZ,
    sway * 0.4, -180 + bob, camZ - 1000,
    0, 1, 0
  );

  ambientLight(255);
  directionalLight(255, 255, 255, 0.8, 1, -1);

  // gentle world-level drift for depth sensation
  rotateY(sin(t / 9000) * 0.07);

  // draw all living entities
  for (const e of entities) {
    e.draw(t);
  }

  // cull the dead
  entities = entities.filter(e => !e.dead);

  // world lifespan end → new cycle, new seed, new palette
  if (worldElapsed > worldLife || camZ < -MAX_Z) {
    cycleCount++;
    initWorld();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
