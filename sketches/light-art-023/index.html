<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Light Art 023 — Walhimer Studio — Mark Walhimer, 2026. Modular audiovisual room with mixed visual families and generative soundscape."
    />
    <title>Light Art 023 — Walhimer Studio — AV Room Lab</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000000;
        font-family: system-ui, sans-serif;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hint {
        position: fixed;
        left: 12px;
        bottom: 10px;
        color: rgba(255, 255, 255, 0.48);
        font-size: 12px;
        pointer-events: none;
        user-select: none;
      }
      #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        width: min(360px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
        overflow: auto;
        background: rgba(0, 0, 0, 0.63);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        color: rgba(255, 255, 255, 0.92);
        padding: 12px;
        font-size: 12px;
        backdrop-filter: blur(5px);
      }
      #ui .row {
        display: grid;
        grid-template-columns: 95px 1fr 44px;
        align-items: center;
        gap: 8px;
        margin: 7px 0;
      }
      #ui .checks {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px 10px;
        margin: 8px 0 10px;
      }
      #ui .checks label {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #ui .section {
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 0.03em;
      }
      #ui input[type='range'] {
        width: 100%;
      }
      #ui .value {
        text-align: right;
        color: rgba(255, 255, 255, 0.76);
        font-variant-numeric: tabular-nums;
      }
      #audio-btn,
      #randomize-btn {
        width: 100%;
        margin: 2px 0 8px;
        border: 1px solid rgba(255, 255, 255, 0.32);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        border-radius: 6px;
        padding: 7px 8px;
        cursor: pointer;
      }
      #audio-btn:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #ui .osc-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0 4px;
      }
      #ui .osc-row label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      #osc-ws {
        width: 100%;
        margin: 4px 0 6px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.4);
        color: rgba(255, 255, 255, 0.92);
        font-size: 11px;
      }
      #osc-status {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
        font-variant-numeric: tabular-nums;
        margin-bottom: 4px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
          "tone": "https://esm.sh/tone@14.8.49"
        }
      }
    </script>
  </head>
  <body>
    <div id="ui">
      <button id="audio-btn" type="button">Start Audio</button>
      <button id="randomize-btn" type="button">Randomize Scene</button>

      <div class="section">Visual Families</div>
      <div class="checks">
        <label><input id="vis-grid" type="checkbox" checked /> Grid</label>
        <label><input id="vis-points" type="checkbox" checked /> Point Cloud</label>
        <label><input id="vis-boxes" type="checkbox" checked /> Translucent Boxes</label>
        <label><input id="vis-curves" type="checkbox" checked /> Curves</label>
      </div>

      <div class="section">Room + Behavior</div>
      <div class="row">
        <label for="room-size">Room</label>
        <input id="room-size" type="range" min="12" max="40" step="1" value="24" />
        <div class="value" data-value="room-size">24</div>
      </div>
      <div class="row">
        <label for="ceiling">Ceiling</label>
        <input id="ceiling" type="range" min="8" max="24" step="1" value="12" />
        <div class="value" data-value="ceiling">12</div>
      </div>
      <div class="row">
        <label for="grid-div">Grid</label>
        <input id="grid-div" type="range" min="8" max="32" step="1" value="18" />
        <div class="value" data-value="grid-div">18</div>
      </div>
      <div class="row">
        <label for="diameter">Diameter</label>
        <input id="diameter" type="range" min="0.25" max="2.8" step="0.01" value="1.2" />
        <div class="value" data-value="diameter">1.20</div>
      </div>
      <div class="row">
        <label for="entropy">Entropy</label>
        <input id="entropy" type="range" min="0" max="1" step="0.01" value="0.56" />
        <div class="value" data-value="entropy">0.56</div>
      </div>
      <div class="row">
        <label for="tempo">Tempo</label>
        <input id="tempo" type="range" min="35" max="130" step="1" value="68" />
        <div class="value" data-value="tempo">68</div>
      </div>

      <div class="section">OSC export</div>
      <div class="osc-row">
        <label><input id="osc-enable" type="checkbox" /> Enable WebSocket → relay</label>
      </div>
      <label for="osc-ws">Relay URL</label>
      <input id="osc-ws" type="text" spellcheck="false" value="ws://127.0.0.1:9091" autocomplete="off" />
      <div id="osc-status">disconnected</div>
    </div>
    <div id="hint">
      Light Art 023 · modular room families + mangle-like audio drift · drag orbit · scroll zoom
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
