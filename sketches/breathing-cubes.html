<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; min-height: 100vh; overflow: hidden; background: #ffffff; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  (function() {
  function getSize() {
    var w = window.innerWidth || document.documentElement.clientWidth || 800;
    var h = window.innerHeight || document.documentElement.clientHeight || 600;
    return [Math.max(w, 400), Math.max(h, 300)];
  }
  function init() {
  var sz = getSize(), w = sz[0], h = sz[1];

  function hsbToRgb(h, s, b) {
    s /= 100; b /= 100;
    const k = n => (n + h / 60) % 6;
    const f = n => b - b * s * Math.max(0, Math.min(k(n), 4 - k(n), 1));
    return [Math.round(f(5)*255), Math.round(f(3)*255), Math.round(f(1)*255)];
  }

  const palette = [310, 45, 30, 210, 270];

  function makeGradientTexture() {
    const hue1 = palette[Math.floor(Math.random() * palette.length)];
    const hue2 = palette[Math.floor(Math.random() * palette.length)];
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    for (let y = 0; y < 256; y++) {
      const t = y / 256;
      const h = hue1 + (hue2 - hue1) * t;
      const [r, g, b] = hsbToRgb(h, 100, 100);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(0, y, 64, 1);
    }
    return new THREE.CanvasTexture(canvas);
  }

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 200);
  camera.position.set(0, 0, 12);
  camera.lookAt(0, 0, 7);

  const renderer = new THREE.WebGLRenderer({
    antialias: true,
    powerPreference: 'default',
    failIfMajorPerformanceCaveat: false
  });
  renderer.setSize(w, h);
  renderer.setClearColor(0xffffff, 1);
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 8, 5);
  scene.add(dirLight);

  const MAX_OPACITY   = 0.35;
  const MIN_OPACITY   = 0.02;
  const BREATH_PERIOD = 12.0;
  const NUM_CUBES     = 5;
  const SPACING       = 3.5;

  const cubes = [];

  for (let i = 0; i < NUM_CUBES; i++) {
    const zPos = -i * SPACING;
    const cw = 1.0 + Math.random() * 2.5;
    const ch = 1.0 + Math.random() * 3.5;
    const cd = 1.0 + Math.random() * 2.5;

    const geo = new THREE.BoxGeometry(cw, ch, cd);
    const outerMats = Array.from({ length: 6 }, () =>
      new THREE.MeshBasicMaterial({
        map: makeGradientTexture(),
        transparent: true,
        opacity: MAX_OPACITY,
        side: THREE.DoubleSide,
      })
    );
    const outerPhases = Array.from({ length: 6 }, () => Math.random() * Math.PI * 2);
    const outerMesh = new THREE.Mesh(geo, outerMats);
    outerMesh.position.z = zPos;
    scene.add(outerMesh);

    const innerGeo = new THREE.BoxGeometry(cw * 0.5, ch * 0.5, cd * 0.5);
    const innerMats = Array.from({ length: 6 }, () =>
      new THREE.MeshBasicMaterial({
        map: makeGradientTexture(),
        transparent: true,
        opacity: MAX_OPACITY * 0.5,
        side: THREE.DoubleSide,
      })
    );
    const innerPhases = Array.from({ length: 6 }, () => Math.random() * Math.PI * 2);
    const innerMesh = new THREE.Mesh(innerGeo, innerMats);
    innerMesh.position.z = zPos;
    scene.add(innerMesh);

    cubes.push({ outerMats, innerMats, outerPhases, innerPhases });
  }

  const label = document.createElement('div');
  label.innerText = 'Three.js · Breathing Cubes';
  label.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    color:rgba(0,0,0,0.3);font-size:11px;letter-spacing:0.3em;
    font-family:monospace;text-transform:uppercase;pointer-events:none;`;
  document.body.appendChild(label);

  const clock = new THREE.Clock();
  let lastTime = 0;
  const FPS_INTERVAL    = 1000 / 60;
  const CAM_START       = 12;
  const CAM_END         = -18;
  const JOURNEY_DURATION = 120.0;

  function animate(timestamp) {
    requestAnimationFrame(animate);
    const elapsed = timestamp - lastTime;
    if (elapsed < FPS_INTERVAL) return;
    lastTime = timestamp - (elapsed % FPS_INTERVAL);

    const t = clock.getElapsedTime();
    const progress = (t % JOURNEY_DURATION) / JOURNEY_DURATION;
    const camZ = CAM_START + (CAM_END - CAM_START) * progress;
    camera.position.z = camZ;
    camera.lookAt(0, 0, camZ - 5);

    cubes.forEach(({ outerMats, innerMats, outerPhases, innerPhases }) => {
      outerMats.forEach((m, i) => {
        const breath = (Math.sin((t / BREATH_PERIOD) * Math.PI * 2 + outerPhases[i]) + 1) / 2;
        m.opacity = MIN_OPACITY + (MAX_OPACITY - MIN_OPACITY) * breath;
      });
      innerMats.forEach((m, i) => {
        const breath = (Math.sin((t / BREATH_PERIOD) * Math.PI * 2 + innerPhases[i]) + 1) / 2;
        m.opacity = (MIN_OPACITY * 0.5) + ((MAX_OPACITY * 0.5) - (MIN_OPACITY * 0.5)) * breath;
      });
    });

    renderer.render(scene, camera);
  }

  animate();

  function onResize() {
    var sz = getSize();
    w = sz[0]; h = sz[1];
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);
  if (window.parent !== window) { setTimeout(onResize, 50); setTimeout(onResize, 300); }
  }
  if (document.readyState === 'complete') {
    init();
  } else {
    window.addEventListener('load', init);
  }
  })();
</script>
</body>
</html>
