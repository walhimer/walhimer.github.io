<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surrender Machine - Mark Walhimer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
<script>
// SURRENDER MACHINE
// Mark Walhimer
// 
// A machine that tries to surrender.
// You can't ask a machine to surrender for you.
// But if you can see it, maybe it's easier to let go.
//
// 3-minute lifecycle:
// 0:00 - 0:30  : White. Almost nothing. First hint.
// 0:30 - 1:30  : Growth. Machine assembles, gains complexity.
// 1:30 - 2:15  : Full state. The machine exists, breathing, trying.
// 2:15 - 2:50  : Surrender. Letting go. Dissolving.
// 2:50 - 3:00  : Return to white.

let machine;
let particles = [];
let time = 0;
let cycleStartTime;
const CYCLE_DURATION = 180000; // 3 minutes

function setup() {
  createCanvas(1080, 1920, WEBGL); // Vertical for exhibition
  colorMode(HSB, 360, 100, 100, 255);
  frameRate(30);
  
  cycleStartTime = millis();
  initMachine();
}

function initMachine() {
  machine = {
    x: 0,
    y: 0,
    z: 0,
    rotX: 0,
    rotY: 0,
    rotZ: 0,
    hue: random(280, 340), // Purple-magenta range
    components: []
  };
  
  // Create components that will appear over time
  for (let i = 0; i < 12; i++) {
    machine.components.push({
      type: floor(random(4)),
      x: random(-100, 100),
      y: random(-150, 150),
      z: random(-100, 100),
      size: random(20, 60),
      rotSpeed: random(0.01, 0.04),
      phase: random(TWO_PI),
      birthTime: 0.15 + i * 0.05, // Staggered appearance
      surrenderDelay: random(0, 0.1) // Staggered letting go
    });
  }
  
  particles = [];
}

function draw() {
  let now = millis();
  let cycleTime = now - cycleStartTime;
  
  // Loop
  if (cycleTime >= CYCLE_DURATION) {
    cycleStartTime = now;
    cycleTime = 0;
    initMachine();
  }
  
  let progress = cycleTime / CYCLE_DURATION; // 0 to 1
  
  // Background: always white, but slightly warm
  background(40, 5, 100);
  
  // Calculate phase intensities
  let machineAlpha = 0;
  let growthProgress = 0;
  let surrenderProgress = 0;
  
  if (progress < 0.17) {
    // 0:00 - 0:30 : Emergence. First hints.
    machineAlpha = map(progress, 0.05, 0.17, 0, 40);
    machineAlpha = constrain(machineAlpha, 0, 40);
    growthProgress = 0;
  } else if (progress < 0.50) {
    // 0:30 - 1:30 : Growth
    machineAlpha = map(progress, 0.17, 0.35, 40, 180);
    machineAlpha = constrain(machineAlpha, 40, 180);
    growthProgress = map(progress, 0.17, 0.50, 0, 1);
  } else if (progress < 0.75) {
    // 1:30 - 2:15 : Full state
    machineAlpha = 180;
    growthProgress = 1;
  } else if (progress < 0.94) {
    // 2:15 - 2:50 : Surrender
    machineAlpha = map(progress, 0.75, 0.94, 180, 0);
    growthProgress = 1;
    surrenderProgress = map(progress, 0.75, 0.94, 0, 1);
  } else {
    // 2:50 - 3:00 : White
    machineAlpha = 0;
  }
  
  // Subtle camera movement
  let camDist = 800;
  let camX = cos(time * 0.0008) * 200;
  let camY = sin(time * 0.0006) * 150;
  let camZ = camDist + sin(time * 0.0004) * 100;
  camera(camX, camY, camZ, 0, 0, 0, 0, 1, 0);
  
  // Lighting - soft, diffuse
  ambientLight(0, 0, 60);
  directionalLight(0, 0, 80, -0.5, 0.5, -1);
  
  if (machineAlpha > 0) {
    drawMachine(machineAlpha, growthProgress, surrenderProgress);
    drawParticles(machineAlpha, surrenderProgress);
  }
  
  time++;
}

function drawMachine(alpha, growth, surrender) {
  push();
  translate(machine.x, machine.y, machine.z);
  
  // Slow rotation
  machine.rotX += 0.003;
  machine.rotY += 0.005;
  machine.rotZ += 0.002;
  
  rotateX(machine.rotX);
  rotateY(machine.rotY);
  rotateZ(machine.rotZ);
  
  // Core - appears first
  if (growth > 0 || alpha > 20) {
    let coreAlpha = alpha;
    let coreSize = 50;
    
    // During surrender, core fragments
    if (surrender > 0) {
      coreSize = 50 * (1 - surrender * 0.5);
      coreAlpha = alpha * (1 - surrender);
    }
    
    // Layered core with stroke
    for (let i = 0; i < 6; i++) {
      let layerAlpha = map(i, 0, 5, coreAlpha, coreAlpha * 0.2);
      let hue = (machine.hue + time * 0.1 + i * 10) % 360;
      
      fill(hue, 50, 90, layerAlpha);
      stroke(hue, 60, 70, layerAlpha * 0.8);
      strokeWeight(1.5 - i * 0.2);
      
      push();
      let scale = 1 + i * 0.2;
      if (surrender > 0) {
        // Drift apart during surrender
        let drift = surrender * 50 * (i + 1);
        translate(
          sin(i * 1.3 + time * 0.01) * drift,
          cos(i * 0.9 + time * 0.01) * drift,
          sin(i * 1.7 + time * 0.01) * drift
        );
        scale *= (1 + surrender * 0.5);
      }
      box(coreSize * scale);
      pop();
    }
  }
  
  // Components - appear based on growth
  for (let comp of machine.components) {
    // Only show if growth has reached this component
    if (growth < comp.birthTime) continue;
    
    // Calculate component's individual growth
    let compGrowth = map(growth, comp.birthTime, comp.birthTime + 0.15, 0, 1);
    compGrowth = constrain(compGrowth, 0, 1);
    compGrowth = easeOutCubic(compGrowth);
    
    // Individual surrender (some let go earlier)
    let compSurrender = map(surrender, comp.surrenderDelay, 1, 0, 1);
    compSurrender = constrain(compSurrender, 0, 1);
    
    let compAlpha = alpha * compGrowth * (1 - compSurrender);
    if (compAlpha < 1) continue;
    
    push();
    
    // Position
    let px = comp.x * compGrowth;
    let py = comp.y * compGrowth;
    let pz = comp.z * compGrowth;
    
    // During surrender, drift outward
    if (compSurrender > 0) {
      let driftMag = compSurrender * 300;
      px += (comp.x / abs(comp.x || 1)) * driftMag;
      py += (comp.y / abs(comp.y || 1)) * driftMag;
      pz += (comp.z / abs(comp.z || 1)) * driftMag;
      
      // Spawn particles during surrender
      if (random() < compSurrender * 0.3) {
        spawnParticle(px, py, pz, machine.hue);
      }
    }
    
    translate(px, py, pz);
    
    // Rotation
    let r = time * comp.rotSpeed + comp.phase;
    rotateX(r);
    rotateY(r * 0.7);
    rotateZ(r * 1.3);
    
    // Draw component with layers
    for (let i = 0; i < 4; i++) {
      let layerAlpha = map(i, 0, 3, compAlpha, compAlpha * 0.3);
      let hue = (machine.hue + 40 + comp.phase * 30 + i * 15) % 360;
      
      fill(hue, 55 + i * 5, 85 + i * 3, layerAlpha);
      stroke(hue, 65, 60, layerAlpha * 0.7);
      strokeWeight(1.2 - i * 0.2);
      
      let size = comp.size * compGrowth * (1 + i * 0.12);
      // Shrink during surrender
      size *= (1 - compSurrender * 0.5);
      
      push();
      if (comp.type === 0) {
        rotateX(HALF_PI);
        cylinder(size * 0.5, size);
      } else if (comp.type === 1) {
        box(size);
      } else if (comp.type === 2) {
        torus(size, size * 0.25, 16, 8);
      } else {
        sphere(size * 0.6, 12, 8);
      }
      pop();
    }
    
    // Connection line to core
    if (compSurrender < 0.5) {
      stroke(machine.hue, 30, 70, compAlpha * 0.4 * (1 - compSurrender * 2));
      strokeWeight(1);
      line(0, 0, 0, -px * 0.3, -py * 0.3, -pz * 0.3);
    }
    
    pop();
  }
  
  pop();
}

function spawnParticle(x, y, z, hue) {
  if (particles.length > 150) return;
  
  particles.push({
    x: x,
    y: y,
    z: z,
    vx: random(-2, 2),
    vy: random(-2, 2),
    vz: random(-2, 2),
    life: 255,
    decay: random(2, 5),
    size: random(3, 10),
    hue: (hue + random(-30, 30)) % 360
  });
}

function drawParticles(alpha, surrender) {
  let globalAlpha = alpha / 180;
  
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    
    push();
    translate(p.x, p.y, p.z);
    
    let pAlpha = p.life * globalAlpha;
    fill(p.hue, 50, 90, pAlpha);
    noStroke();
    sphere(p.size * (p.life / 255), 6, 4);
    pop();
    
    // Update
    p.x += p.vx;
    p.y += p.vy;
    p.z += p.vz;
    p.vy += 0.02; // Slight gravity
    p.life -= p.decay;
    
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function easeOutCubic(t) {
  return 1 - pow(1 - t, 3);
}

// Testing controls
function keyPressed() {
  if (key === 'r') {
    cycleStartTime = millis();
    initMachine();
  }
  if (key === '1') cycleStartTime = millis(); // Start
  if (key === '2') cycleStartTime = millis() - 30000; // Growth
  if (key === '3') cycleStartTime = millis() - 90000; // Full
  if (key === '4') cycleStartTime = millis() - 135000; // Surrender
}
</script>
</body>
</html>
