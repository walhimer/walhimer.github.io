<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TVXX0YPGCN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-TVXX0YPGCN');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>disc + string</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000002; }

    canvas.layer {
      position: fixed; inset: 0;
      width: 100% !important; height: 100% !important;
    }
    #strings {
      mix-blend-mode: screen;
      z-index: 1;
      pointer-events: none;
    }
    #composite { display: none; }

    #bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex; align-items: center; gap: 14px;
      padding: 12px 22px 16px;
      background: linear-gradient(to top, rgba(0,0,4,0.96) 0%, transparent 100%);
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: rgba(200,200,215,0.65);
      flex-wrap: wrap;
    }
    #bar .ctrl { display: flex; align-items: center; gap: 7px; }
    #bar label  { white-space: nowrap; letter-spacing: 0.05em; }
    #bar .val   { color: rgba(200,200,215,0.9); min-width: 26px; text-align: right; }

    input[type=range] {
      -webkit-appearance: none;
      width: 86px; height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      background: rgba(255,255,255,0.85);
      border-radius: 50%; cursor: pointer;
    }
    select {
      background: rgba(255,255,255,0.05);
      color: rgba(200,200,215,0.9);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 4px 7px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      cursor: pointer; outline: none;
    }
    select:hover { border-color: rgba(255,255,255,0.28); }

    .btn {
      background: rgba(255,255,255,0.07);
      color: rgba(200,200,215,0.9);
      border: 1px solid rgba(255,255,255,0.16);
      padding: 6px 15px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      cursor: pointer; letter-spacing: 0.06em;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.34); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #recordBtn {
      background: rgba(220,50,50,0.14);
      border-color: rgba(255,80,80,0.38);
      color: rgba(255,160,160,0.95);
    }
    #recordBtn:hover:not(:disabled) {
      background: rgba(220,50,50,0.28);
      border-color: rgba(255,80,80,0.65);
    }
    #recordBtn.active {
      background: rgba(220,40,40,0.32);
      border-color: rgba(255,90,90,0.85);
      color: #fff;
      animation: rpulse 1s ease-in-out infinite;
    }
    @keyframes rpulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,60,60,0); }
      50%      { box-shadow: 0 0 0 5px rgba(255,60,60,0.28); }
    }

    /* progress bar */
    #progBar {
      display: none; align-items: center; gap: 8px;
      font-size: 10px; color: rgba(255,160,160,0.8);
    }
    #progBar.show { display: flex; }
    #progTrack {
      width: 80px; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
    }
    #progFill {
      height: 100%; width: 0%;
      background: rgba(255,90,90,0.85); border-radius: 2px;
      transition: width 0.2s linear;
    }

    .divider { width: 1px; height: 26px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    #rightGroup { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    /* overlay status */
    #status {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'DM Mono', monospace; font-size: 13px;
      color: rgba(200,200,220,0.5); letter-spacing: 0.12em;
      pointer-events: none; transition: opacity 0.5s;
      z-index: 5;
    }
    #status.hide { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="moon" class="layer"></canvas>
  <canvas id="strings" class="layer"></canvas>
  <canvas id="composite"></canvas>
  <div id="status">press ▶ preview or ⏺ record</div>

  <div id="bar">
    <div class="ctrl">
      <label>mode</label>
      <select id="selMode">
        <option value="random" selected>random</option>
        <option value="cross">cross</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="ctrl">
      <label>palette</label>
      <select id="selPalette">
        <option value="neon">neon</option>
        <option value="sunset">sunset</option>
        <option value="ocean">ocean</option>
        <option value="aurora" selected>aurora</option>
        <option value="candy">candy</option>
        <option value="forest">forest</option>
        <option value="fire">fire</option>
        <option value="rainbow">rainbow</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="ctrl">
      <label>nails</label>
      <input type="range" id="slNails" min="40" max="200" step="2" value="120">
      <span class="val" id="vNails">120</span>
    </div>
    <div class="ctrl">
      <label>strings</label>
      <input type="range" id="slStrings" min="100" max="900" step="10" value="500">
      <span class="val" id="vStrings">500</span>
    </div>
    <div class="ctrl">
      <label>opacity</label>
      <input type="range" id="slOpacity" min="3" max="60" step="1" value="18">
      <span class="val" id="vOpacity">18</span>
    </div>
    <div class="ctrl">
      <label>weight</label>
      <input type="range" id="slWeight" min="2" max="30" step="1" value="8">
      <span class="val" id="vWeight">8</span>
    </div>
    <div class="divider"></div>

    <div id="rightGroup">
      <div id="progBar">
        <div id="progTrack"><div id="progFill"></div></div>
        <span id="progLabel">0s</span>
      </div>

      <div class="ctrl">
        <label>draw over</label>
        <select id="selDuration">
          <option value="5">5 s</option>
          <option value="8" selected>8 s</option>
          <option value="12">12 s</option>
          <option value="20">20 s</option>
        </select>
      </div>

      <button id="previewBtn" class="btn">▶ preview</button>
      <button id="recordBtn"  class="btn">⏺ record</button>
      <button id="seedBtn"    class="btn">⟳ new seed</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ─── PRNG ────────────────────────────────────────────────────────────────────
    var seed = Math.floor(Math.random() * 0xFFFFFFFF);
    function mkRng(s) {
      return function() {
        s |= 0; s = s + 0x6D2B79F5 | 0;
        var t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // ─── Palettes ────────────────────────────────────────────────────────────────
    var palettes = {
      neon:    [[255,0,120],[0,255,200],[120,0,255],[255,255,0],[0,180,255],[255,80,0]],
      sunset:  [[255,50,50],[255,120,0],[255,200,0],[255,80,120],[200,0,80],[255,160,60]],
      ocean:   [[0,100,255],[0,200,220],[0,255,180],[80,0,200],[0,150,255],[100,220,255]],
      aurora:  [[0,255,100],[0,200,255],[120,0,255],[255,0,200],[0,255,200],[200,100,255]],
      candy:   [[255,100,200],[100,200,255],[255,200,100],[200,100,255],[100,255,200],[255,150,150]],
      forest:  [[0,200,80],[100,255,0],[0,150,100],[200,255,0],[0,100,60],[50,200,50]],
      fire:    [[255,0,0],[255,100,0],[255,200,0],[0,150,255],[0,200,255],[255,50,50]],
      rainbow: [[255,0,0],[255,150,0],[255,255,0],[0,255,0],[0,100,255],[150,0,255]]
    };

    // ─── Moon params ─────────────────────────────────────────────────────────────
    var morphSpeed, morphDepth, morphPhase, slowSpin;
    var discRadius, offsetX, offsetY, lightAngle, discR, discG, discB;

    function buildSeed() {
      var r  = mkRng(seed);
      morphSpeed = 0.07 + r() * 0.14;
      morphDepth = 1.4  + r() * 1.4;
      morphPhase = r() * Math.PI * 2;
      slowSpin   = (r() - 0.5) * 0.005;
      discRadius = 1.6  + r() * 0.7;
      offsetX    = (r() - 0.5) * 1.6;
      offsetY    = (r() - 0.5) * 0.8;
      lightAngle = r() * Math.PI * 2;
      discR      = 0.70 + r() * 0.20;
      discG      = 0.63 + r() * 0.15;
      discB      = 0.52 + r() * 0.16;
    }

    // ─── Flat segment list ───────────────────────────────────────────────────────
    // Each entry: { fromIdx, toIdx, color }
    // Segments are stored in draw order — this IS the animation sequence.
    var segments  = [];  // all segments
    var nailCount = 0;   // N value used when segments were built
    var nailPos   = [];  // screen positions, rebuilt on resize

    function buildSegments() {
      segments  = [];
      var pal   = palettes[document.getElementById('selPalette').value];
      var N     = parseInt(document.getElementById('slNails').value);
      nailCount = N;
      var count = parseInt(document.getElementById('slStrings').value);
      var rng   = mkRng(seed ^ 0xDEADBEEF);
      var mode  = document.getElementById('selMode').value;

      for (var s = 0; s < count; s++) {
        var cur  = Math.floor(rng() * N);
        var ci   = Math.floor(rng() * pal.length);
        var segs = 3 + Math.floor(rng() * 7);
        for (var seg = 0; seg < segs; seg++) {
          var next;
          if (mode === 'random') {
            // Truly random: any nail except the immediate neighbours (skip 2..N-2)
            var skip = 2 + Math.floor(rng() * (N - 3));
            next = (cur + skip) % N;
          } else {
            // cross: near-diametric chords (30–70% skip) — symmetric fractal feel
            var skipMin = Math.floor(N * 0.30);
            var skipMax = Math.floor(N * 0.70);
            var skip    = skipMin + Math.floor(rng() * (skipMax - skipMin + 1));
            next = (cur + skip) % N;
          }
          ci = (ci + 1 + Math.floor(rng() * (pal.length - 1))) % pal.length;
          segments.push({ from: cur, to: next, color: pal[ci] });
          cur = next;
        }
      }
    }

    function computeNailPositions() {
      var N      = nailCount;
      var worldH = 2 * Math.tan(20 * Math.PI / 180) * camera.position.z;
      var scale  = H / worldH;
      var cx     = W / 2 + offsetX * scale;
      var cy     = H / 2 - offsetY * scale;
      var pr     = discRadius * scale;
      nailPos = [];
      for (var i = 0; i < N; i++) {
        var a = (2 * Math.PI * i) / N;
        nailPos.push({ x: cx + pr * Math.cos(a), y: cy + pr * Math.sin(a) });
      }
    }

    // ─── String canvas ───────────────────────────────────────────────────────────
    var strCanvas = document.getElementById('strings');
    var strCtx;

    function initStringCanvas() {
      var dpr = window.devicePixelRatio || 1;
      strCanvas.width  = W * dpr;
      strCanvas.height = H * dpr;
      strCanvas.style.width  = W + 'px';
      strCanvas.style.height = H + 'px';
      strCtx = strCanvas.getContext('2d');
      strCtx.scale(dpr, dpr);
      strCtx.clearRect(0, 0, W, H);
    }

    function drawSegmentRange(fromIdx, toIdx) {
      // Draw nails once before first segment
      if (fromIdx === 0) {
        var N = nailCount;
        strCtx.fillStyle = 'rgba(230,230,240,0.45)';
        for (var i = 0; i < N; i++) {
          strCtx.beginPath();
          strCtx.arc(nailPos[i].x, nailPos[i].y, 1.8, 0, Math.PI * 2);
          strCtx.fill();
        }
      }
      var opacity = parseInt(document.getElementById('slOpacity').value) / 100;
      var weight  = parseInt(document.getElementById('slWeight').value) / 10;
      for (var i = fromIdx; i < toIdx; i++) {
        var seg  = segments[i];
        var from = nailPos[seg.from];
        var to   = nailPos[seg.to];
        var col  = seg.color;
        strCtx.lineWidth   = weight;
        strCtx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + opacity + ')';
        strCtx.beginPath();
        strCtx.moveTo(from.x, from.y);
        strCtx.lineTo(to.x,   to.y);
        strCtx.stroke();
      }
    }

    // ─── Three.js Moon ───────────────────────────────────────────────────────────
    var W = window.innerWidth, H = window.innerHeight;

    var renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('moon'),
      antialias: true,
      preserveDrawingBuffer: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(W, H, true);
    renderer.physicallyCorrectLights = true;

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
    camera.position.z = 10;

    // Sky gradient
    var skyGeo = new THREE.PlaneGeometry(80, 80, 1, 32);
    var skyColors = [], sp = skyGeo.attributes.position;
    for (var i = 0; i < sp.count; i++) {
      var t = Math.max(0, Math.min(1, (sp.getY(i) + 40) / 80)), tc = t*t*t;
      skyColors.push(0.0002 + tc*0.003, 0.0003 + tc*0.050, 0.0008 + tc*0.185);
    }
    skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(skyColors, 3));
    var skyMesh = new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({ vertexColors: true, depthWrite: false }));
    skyMesh.position.z = -9;
    scene.add(skyMesh);
    scene.add(new THREE.AmbientLight(0xffffff, 0.06));

    var discGeo, origPos, disc, keyLight, fillLight;

    function rebuildMoon() {
      if (disc)      { scene.remove(disc); discGeo.dispose(); }
      if (keyLight)  scene.remove(keyLight);
      if (fillLight) scene.remove(fillLight);

      discGeo = new THREE.CircleGeometry(discRadius, 160);
      origPos = Float32Array.from(discGeo.attributes.position.array);
      disc = new THREE.Mesh(discGeo, new THREE.MeshStandardMaterial({
        color: new THREE.Color(discR, discG, discB),
        roughness: 0.82, metalness: 0.0, side: THREE.DoubleSide
      }));
      disc.position.set(offsetX, offsetY, 0);
      scene.add(disc);

      keyLight = new THREE.DirectionalLight(new THREE.Color(1.0, 0.92, 0.78), 3.8);
      keyLight.position.set(Math.cos(lightAngle)*6, Math.sin(lightAngle)*4+2, 5);
      scene.add(keyLight);

      fillLight = new THREE.DirectionalLight(new THREE.Color(0.28, 0.42, 0.80), 0.45);
      fillLight.position.set(-keyLight.position.x*0.5, -2, 3);
      scene.add(fillLight);
    }

    // ─── Composite canvas ────────────────────────────────────────────────────────
    var compCanvas = document.getElementById('composite');
    var compCtx    = compCanvas.getContext('2d');

    function compositeFrame() {
      compCanvas.width  = W;
      compCanvas.height = H;
      compCtx.globalCompositeOperation = 'source-over';
      compCtx.drawImage(document.getElementById('moon'), 0, 0, W, H);
      compCtx.globalCompositeOperation = 'screen';
      compCtx.drawImage(strCanvas, 0, 0, W, H);
      compCtx.globalCompositeOperation = 'source-over';
    }

    // ─── Draw animation state ────────────────────────────────────────────────────
    var isDrawing    = false;
    var drawnCount   = 0;      // segments drawn so far
    var segsPerFrame = 0;      // calculated at start
    var onDrawDone   = null;   // callback when all segments drawn

    function startDraw(onDone) {
      // Reset string canvas to blank
      initStringCanvas();
      computeNailPositions();
      drawnCount   = 0;
      isDrawing    = true;
      onDrawDone   = onDone || null;

      var durSecs  = parseInt(document.getElementById('selDuration').value);
      var fps      = 60;
      segsPerFrame = Math.max(1, Math.ceil(segments.length / (durSecs * fps)));

      // Hide status
      document.getElementById('status').classList.add('hide');
    }

    // ─── Recording ───────────────────────────────────────────────────────────────
    var mediaRecorder = null;
    var recChunks     = [];

    function startRecording() {
      var mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4']
        .find(function(m) { return MediaRecorder.isTypeSupported(m); }) || '';

      compCanvas.width  = W;
      compCanvas.height = H;

      var stream = compCanvas.captureStream(60);
      mediaRecorder = new MediaRecorder(stream, mimeType
        ? { mimeType: mimeType, videoBitsPerSecond: 10000000 }
        : {});
      recChunks = [];

      mediaRecorder.ondataavailable = function(e) {
        if (e.data && e.data.size > 0) recChunks.push(e.data);
      };

      mediaRecorder.onstop = function() {
        var blob = new Blob(recChunks, { type: mimeType || 'video/webm' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href     = url;
        a.download = 'string-art-' + seed.toString(16) + '.webm';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 5000);

        // UI reset
        document.getElementById('recordBtn').classList.remove('active');
        document.getElementById('recordBtn').textContent = '⏺ record';
        document.getElementById('recordBtn').disabled = false;
        document.getElementById('previewBtn').disabled = false;
        document.getElementById('progBar').classList.remove('show');
      };

      mediaRecorder.start(100);
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }

    // ─── Animation loop ───────────────────────────────────────────────────────────
    var clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      if (!disc) return;

      // Morph moon
      var t    = clock.getElapsedTime();
      var wave = Math.sin(t * morphSpeed + morphPhase);
      var pos  = discGeo.attributes.position;
      for (var i = 0; i < pos.count; i++) {
        var ox = origPos[i*3], oy = origPos[i*3+1];
        var nr = Math.sqrt(ox*ox + oy*oy) / discRadius;
        pos.setZ(i, morphDepth * wave * Math.max(0, 1 - nr*nr));
      }
      pos.needsUpdate = true;
      discGeo.computeVertexNormals();
      disc.rotation.z += slowSpin;
      renderer.render(scene, camera);

      // Progressive string draw
      if (isDrawing && drawnCount < segments.length) {
        var prev = drawnCount;
        drawnCount = Math.min(drawnCount + segsPerFrame, segments.length);
        drawSegmentRange(prev, drawnCount);

        // Update progress bar
        var frac = drawnCount / segments.length;
        document.getElementById('progFill').style.width = (frac * 100).toFixed(1) + '%';
        var durSecs = parseInt(document.getElementById('selDuration').value);
        document.getElementById('progLabel').textContent = (frac * durSecs).toFixed(0) + 's';

        if (drawnCount >= segments.length) {
          isDrawing = false;
          if (onDrawDone) { onDrawDone(); onDrawDone = null; }
        }
      }

      // Feed composite to recorder every frame
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        compositeFrame();
      }
    }
    animate();

    // ─── Buttons ─────────────────────────────────────────────────────────────────
    document.getElementById('previewBtn').addEventListener('click', function() {
      if (isDrawing) return;
      document.getElementById('progBar').classList.add('show');
      document.getElementById('progFill').style.width = '0%';
      document.getElementById('progLabel').textContent = '0s';
      startDraw(null);
    });

    document.getElementById('recordBtn').addEventListener('click', function() {
      if (isDrawing || (mediaRecorder && mediaRecorder.state === 'recording')) return;

      document.getElementById('recordBtn').classList.add('active');
      document.getElementById('recordBtn').textContent = '● recording…';
      document.getElementById('recordBtn').disabled = true;
      document.getElementById('previewBtn').disabled = true;
      document.getElementById('progBar').classList.add('show');
      document.getElementById('progFill').style.width = '0%';
      document.getElementById('progLabel').textContent = '0s';

      startRecording();

      startDraw(function() {
        // All strings drawn — stop recording after brief hold
        setTimeout(stopRecording, 600);
      });
    });

    document.getElementById('seedBtn').addEventListener('click', function() {
      seed = Math.floor(Math.random() * 0xFFFFFFFF);
      fullRebuild();
    });

    // ─── Controls ────────────────────────────────────────────────────────────────
    function bindSlider(id, valId, onchange) {
      var el = document.getElementById(id), vl = document.getElementById(valId);
      el.addEventListener('input', function() { vl.textContent = el.value; onchange(); });
    }
    bindSlider('slNails',   'vNails',   function() { buildSegments(); initStringCanvas(); });
    bindSlider('slStrings', 'vStrings', function() { buildSegments(); initStringCanvas(); });
    bindSlider('slOpacity', 'vOpacity', function() {});
    bindSlider('slWeight',  'vWeight',  function() {});

    document.getElementById('selPalette').addEventListener('change', function() {
      buildSegments(); initStringCanvas();
    });
    document.getElementById('selMode').addEventListener('change', function() {
      buildSegments(); initStringCanvas();
    });

    // ─── Resize ──────────────────────────────────────────────────────────────────
    window.addEventListener('resize', function() {
      W = window.innerWidth; H = window.innerHeight;
      camera.aspect = W / H;
      camera.updateProjectionMatrix();
      renderer.setSize(W, H, true);
      initStringCanvas();
      computeNailPositions();
    });

    // ─── Init ────────────────────────────────────────────────────────────────────
    function fullRebuild() {
      isDrawing = false;
      buildSeed();
      rebuildMoon();
      buildSegments();
      initStringCanvas();
      computeNailPositions();
      document.getElementById('progBar').classList.remove('show');
      document.getElementById('progFill').style.width = '0%';
      document.getElementById('status').classList.remove('hide');
      document.getElementById('previewBtn').disabled = false;
      document.getElementById('recordBtn').disabled = false;
    }

    fullRebuild();
  </script>
</body>
</html>
