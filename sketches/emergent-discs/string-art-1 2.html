<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Art — Generative WebGL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #d4d4d8;
    font-family: 'DM Mono', monospace;
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #sidebar {
    width: 260px;
    min-width: 260px;
    background: #111114;
    border-right: 1px solid #1e1e24;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
    height: 100vh;
    position: sticky;
    top: 0;
  }

  #sidebar h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  #sidebar .subtitle {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-group label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .control-group .value-display {
    font-size: 11px;
    color: #aaa;
    float: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #222;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }

  select {
    background: #1a1a1f;
    color: #d4d4d8;
    border: 1px solid #2a2a30;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  select:hover { border-color: #444; }

  button {
    background: #fff;
    color: #0a0a0c;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  button:hover {
    background: #e0e0e0;
    transform: translateY(-1px);
  }

  button.secondary {
    background: #1a1a1f;
    color: #d4d4d8;
    border: 1px solid #2a2a30;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  button.secondary:hover {
    background: #222;
    border-color: #444;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .divider {
    height: 1px;
    background: #1e1e24;
    margin: 4px 0;
  }

  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }

  canvas { display: block; }

  .color-scheme-preview {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .color-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div>
    <h1>String Art</h1>
    <div class="subtitle">Generative WebGL</div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Canvas Width <span class="value-display" id="wVal">700</span></label>
    <input type="range" id="canvasW" min="200" max="1000" value="700" step="10">
  </div>

  <div class="control-group">
    <label>Canvas Height <span class="value-display" id="hVal">700</span></label>
    <input type="range" id="canvasH" min="200" max="1000" value="700" step="10">
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Nails Per Side <span class="value-display" id="npsVal">30</span></label>
    <input type="range" id="nailsPerSide" min="3" max="50" value="30">
  </div>

  <div class="control-group">
    <label>String Count <span class="value-display" id="strVal">200</span></label>
    <input type="range" id="stringCount" min="10" max="800" value="200">
  </div>

  <div class="control-group">
    <label>Max Segments <span class="value-display" id="segVal">12</span></label>
    <input type="range" id="maxSegments" min="2" max="30" value="12">
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>String Opacity <span class="value-display" id="opVal">35</span></label>
    <input type="range" id="opacity" min="3" max="100" value="35">
  </div>

  <div class="control-group">
    <label>String Weight <span class="value-display" id="swVal">1.2</span></label>
    <input type="range" id="strokeW" min="0.3" max="5" value="1.2" step="0.1">
  </div>

  <div class="control-group">
    <label>Nail Size <span class="value-display" id="nsVal">4</span></label>
    <input type="range" id="nailSize" min="1" max="10" value="4" step="0.5">
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Start Pattern</label>
    <select id="pattern">
      <option value="mixed">Mixed</option>
      <option value="center-out">Center Outward</option>
      <option value="corners">Corner Bursts</option>
      <option value="top-down">Top → Down</option>
      <option value="bottom-up">Bottom → Up</option>
      <option value="left-right">Left → Right</option>
    </select>
  </div>

  <div class="control-group">
    <label>Color Palette</label>
    <select id="palette">
      <option value="neon">Neon Electric</option>
      <option value="sunset">Sunset Blaze</option>
      <option value="ocean">Deep Ocean</option>
      <option value="aurora">Aurora Borealis</option>
      <option value="candy">Candy Pop</option>
      <option value="forest">Emerald Forest</option>
      <option value="fire">Fire & Ice</option>
      <option value="rainbow">Full Spectrum</option>
    </select>
    <div class="color-scheme-preview" id="palettePreview"></div>
  </div>

  <div class="control-group">
    <label>Background</label>
    <select id="bgColor">
      <option value="black">Black</option>
      <option value="dark">Dark Gray</option>
      <option value="navy">Deep Navy</option>
      <option value="white">White</option>
    </select>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button id="generateBtn" style="flex:1">Generate</button>
  </div>
  <div class="btn-row">
    <button class="secondary" id="saveBtn" style="flex:1">Save PNG</button>
  </div>
</div>

<div id="canvas-container"></div>

<script>
const palettes = {
  neon:    [[255,0,120],[0,255,200],[120,0,255],[255,255,0],[0,180,255],[255,80,0]],
  sunset:  [[255,50,50],[255,120,0],[255,200,0],[255,80,120],[200,0,80],[255,160,60]],
  ocean:   [[0,100,255],[0,200,220],[0,255,180],[80,0,200],[0,150,255],[100,220,255]],
  aurora:  [[0,255,100],[0,200,255],[120,0,255],[255,0,200],[0,255,200],[200,100,255]],
  candy:   [[255,100,200],[100,200,255],[255,200,100],[200,100,255],[100,255,200],[255,150,150]],
  forest:  [[0,200,80],[100,255,0],[0,150,100],[200,255,0],[0,100,60],[50,200,50]],
  fire:    [[255,0,0],[255,100,0],[255,200,0],[0,150,255],[0,200,255],[255,50,50]],
  rainbow: [[255,0,0],[255,150,0],[255,255,0],[0,255,0],[0,100,255],[150,0,255]]
};

const bgs = {
  black: [10, 10, 12],
  dark:  [30, 30, 35],
  navy:  [10, 15, 35],
  white: [245, 245, 240]
};

let strings = [];
let cw, ch, nailCount;
let margin = 40;

// Border nails by edge
let topNails = [], rightNails = [], bottomNails = [], leftNails = [];
let allNails = [];

function setup() {
  cw = int(document.getElementById('canvasW').value);
  ch = int(document.getElementById('canvasH').value);
  let cnv = createCanvas(cw, ch, WEBGL);
  cnv.parent('canvas-container');
  pixelDensity(2);
  generateArt();
}

function buildNails() {
  nailCount = int(document.getElementById('nailsPerSide').value);
  topNails = [];
  rightNails = [];
  bottomNails = [];
  leftNails = [];
  allNails = [];

  let halfW = cw / 2;
  let halfH = ch / 2;
  let innerW = cw - margin * 2;
  let innerH = ch - margin * 2;

  // Top edge: left to right (nailCount nails)
  for (let i = 0; i < nailCount; i++) {
    let t = nailCount > 1 ? i / (nailCount - 1) : 0.5;
    topNails.push({
      x: -halfW + margin + t * innerW,
      y: -halfH + margin,
      edge: 'top', index: i
    });
  }

  // Bottom edge: left to right
  for (let i = 0; i < nailCount; i++) {
    let t = nailCount > 1 ? i / (nailCount - 1) : 0.5;
    bottomNails.push({
      x: -halfW + margin + t * innerW,
      y: halfH - margin,
      edge: 'bottom', index: i
    });
  }

  // Left edge: top to bottom
  for (let i = 0; i < nailCount; i++) {
    let t = nailCount > 1 ? i / (nailCount - 1) : 0.5;
    leftNails.push({
      x: -halfW + margin,
      y: -halfH + margin + t * innerH,
      edge: 'left', index: i
    });
  }

  // Right edge: top to bottom
  for (let i = 0; i < nailCount; i++) {
    let t = nailCount > 1 ? i / (nailCount - 1) : 0.5;
    rightNails.push({
      x: halfW - margin,
      y: -halfH + margin + t * innerH,
      edge: 'right', index: i
    });
  }

  allNails = [...topNails, ...bottomNails, ...leftNails, ...rightNails];
}

function getEdgeArray(edge) {
  if (edge === 'top') return topNails;
  if (edge === 'bottom') return bottomNails;
  if (edge === 'left') return leftNails;
  if (edge === 'right') return rightNails;
  return [];
}

function getOppositeEdge(edge) {
  if (edge === 'top') return 'bottom';
  if (edge === 'bottom') return 'top';
  if (edge === 'left') return 'right';
  if (edge === 'right') return 'left';
  return '';
}

function isHorizontalEdge(edge) {
  return edge === 'top' || edge === 'bottom';
}

function generateArt() {
  cw = int(document.getElementById('canvasW').value);
  ch = int(document.getElementById('canvasH').value);
  resizeCanvas(cw, ch);
  buildNails();

  strings = [];
  let count = int(document.getElementById('stringCount').value);
  let maxSeg = int(document.getElementById('maxSegments').value);
  let patternType = document.getElementById('pattern').value;
  let pal = palettes[document.getElementById('palette').value];

  for (let i = 0; i < count; i++) {
    let path = generatePath(patternType, pal, maxSeg);
    if (path.length >= 2) strings.push(path);
  }

  redraw();
}

function generatePath(patternType, pal, maxSeg) {
  let path = [];
  let current = pickStartNail(patternType);
  if (!current) return path;

  let colorIdx = int(random(pal.length));
  let segCount = int(random(2, maxSeg + 1));

  path.push({ nail: current, color: pal[colorIdx] });

  for (let s = 0; s < segCount; s++) {
    // From current nail, cross to the opposite edge (perpendicular).
    // top/bottom nails cross vertically (same index → same x).
    // left/right nails cross horizontally (same index → same y).
    let oppEdge = getOppositeEdge(current.edge);
    let oppNails = getEdgeArray(oppEdge);
    
    // Cross straight across: same index = perfectly perpendicular
    let targetIdx = current.index;
    // But also allow slight offset for visual variety
    if (random() < 0.4) {
      targetIdx = constrain(current.index + int(random(-3, 4)), 0, nailCount - 1);
    }
    
    let target = oppNails[targetIdx];
    colorIdx = (colorIdx + int(random(1, pal.length))) % pal.length;
    path.push({ nail: target, color: pal[colorIdx] });

    // Now turn 90°: move to an adjacent edge.
    // From top/bottom → go to left or right edge
    // From left/right → go to top or bottom edge
    let perpEdges;
    if (isHorizontalEdge(target.edge)) {
      perpEdges = random() < 0.5 ? leftNails : rightNails;
    } else {
      perpEdges = random() < 0.5 ? topNails : bottomNails;
    }

    let nextIdx = int(random(nailCount));
    let next = perpEdges[nextIdx];

    colorIdx = (colorIdx + int(random(1, pal.length))) % pal.length;
    path.push({ nail: next, color: pal[colorIdx] });

    current = next;
  }

  return path;
}

function pickStartNail(patternType) {
  switch (patternType) {
    case 'center-out': {
      let edges = [topNails, bottomNails, leftNails, rightNails];
      let edge = edges[int(random(4))];
      let center = int(nailCount / 2);
      let offset = int(random(-3, 4));
      return edge[constrain(center + offset, 0, nailCount - 1)];
    }
    case 'corners': {
      let cornerNails = [
        topNails[0], topNails[nailCount - 1],
        bottomNails[0], bottomNails[nailCount - 1]
      ];
      let c = cornerNails[int(random(4))];
      let edge = getEdgeArray(c.edge);
      let spread = int(random(0, 5));
      let idx = c.index === 0 ? spread : constrain(c.index - spread, 0, nailCount - 1);
      return edge[idx];
    }
    case 'top-down':
      return topNails[int(random(nailCount))];
    case 'bottom-up':
      return bottomNails[int(random(nailCount))];
    case 'left-right':
      return leftNails[int(random(nailCount))];
    case 'mixed':
    default:
      return allNails[int(random(allNails.length))];
  }
}

function draw() {
  let bg = bgs[document.getElementById('bgColor').value] || bgs.black;
  background(bg[0], bg[1], bg[2]);

  let opacityVal = float(document.getElementById('opacity').value) / 100 * 255;
  let sw = float(document.getElementById('strokeW').value);
  let ns = float(document.getElementById('nailSize').value);
  let bgKey = document.getElementById('bgColor').value;
  let nailFill = bgKey === 'white' ? [60, 60, 60, 220] : [200, 200, 200, 220];

  // Draw strings
  for (let s of strings) {
    for (let i = 0; i < s.length - 1; i++) {
      let from = s[i];
      let to = s[i + 1];
      let col = to.color;
      stroke(col[0], col[1], col[2], opacityVal);
      strokeWeight(sw);
      line(from.nail.x, from.nail.y, 0, to.nail.x, to.nail.y, 0);
    }
  }

  // Draw nails on top
  noStroke();
  fill(nailFill[0], nailFill[1], nailFill[2], nailFill[3]);
  for (let nail of allNails) {
    push();
    translate(nail.x, nail.y, 1);
    circle(0, 0, ns);
    pop();
  }

  noLoop();
}

// UI
function bindSlider(id, displayId, redrawOnly) {
  let el = document.getElementById(id);
  let disp = document.getElementById(displayId);
  el.addEventListener('input', () => {
    disp.textContent = el.value;
    if (redrawOnly) loop();
  });
}

bindSlider('canvasW', 'wVal', false);
bindSlider('canvasH', 'hVal', false);
bindSlider('nailsPerSide', 'npsVal', false);
bindSlider('stringCount', 'strVal', false);
bindSlider('maxSegments', 'segVal', false);
bindSlider('opacity', 'opVal', true);
bindSlider('strokeW', 'swVal', true);
bindSlider('nailSize', 'nsVal', true);

document.getElementById('bgColor').addEventListener('change', () => loop());
document.getElementById('generateBtn').addEventListener('click', generateArt);
document.getElementById('saveBtn').addEventListener('click', () => saveCanvas('string-art', 'png'));
document.getElementById('palette').addEventListener('change', updatePalettePreview);

function updatePalettePreview() {
  let pal = palettes[document.getElementById('palette').value];
  let container = document.getElementById('palettePreview');
  container.innerHTML = '';
  for (let c of pal) {
    let dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = `rgb(${c[0]},${c[1]},${c[2]})`;
    container.appendChild(dot);
  }
}

updatePalettePreview();
</script>

</body>
</html>
