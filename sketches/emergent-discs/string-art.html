<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Art — Generative WebGL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #d4d4d8;
    font-family: 'DM Mono', monospace;
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #sidebar {
    width: 260px;
    min-width: 260px;
    background: #111114;
    border-right: 1px solid #1e1e24;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
    height: 100vh;
    position: sticky;
    top: 0;
  }

  #sidebar h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  #sidebar .subtitle {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-group label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .control-group .value-display {
    font-size: 11px;
    color: #aaa;
    float: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #222;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }

  select {
    background: #1a1a1f;
    color: #d4d4d8;
    border: 1px solid #2a2a30;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  select:hover { border-color: #444; }

  button {
    background: #fff;
    color: #0a0a0c;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  button:hover {
    background: #e0e0e0;
    transform: translateY(-1px);
  }

  button.secondary {
    background: #1a1a1f;
    color: #d4d4d8;
    border: 1px solid #2a2a30;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  button.secondary:hover {
    background: #222;
    border-color: #444;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .divider {
    height: 1px;
    background: #1e1e24;
    margin: 4px 0;
  }

  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }

  canvas { display: block; }

  .color-scheme-preview {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }

  .color-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div>
    <h1>String Art</h1>
    <div class="subtitle">Generative WebGL</div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Canvas Width <span class="value-display" id="wVal">700</span></label>
    <input type="range" id="canvasW" min="200" max="1000" value="700" step="10">
  </div>

  <div class="control-group">
    <label>Canvas Height <span class="value-display" id="hVal">700</span></label>
    <input type="range" id="canvasH" min="200" max="1000" value="700" step="10">
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Grid Columns <span class="value-display" id="colVal">20</span></label>
    <input type="range" id="gridCols" min="3" max="50" value="20">
  </div>

  <div class="control-group">
    <label>Grid Rows <span class="value-display" id="rowVal">20</span></label>
    <input type="range" id="gridRows" min="3" max="50" value="20">
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>String Count <span class="value-display" id="strVal">150</span></label>
    <input type="range" id="stringCount" min="10" max="500" value="150">
  </div>

  <div class="control-group">
    <label>String Opacity <span class="value-display" id="opVal">40</span></label>
    <input type="range" id="opacity" min="5" max="100" value="40">
  </div>

  <div class="control-group">
    <label>String Weight <span class="value-display" id="swVal">1.5</span></label>
    <input type="range" id="strokeW" min="0.5" max="5" value="1.5" step="0.1">
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <label>Nail Size <span class="value-display" id="nsVal">3</span></label>
    <input type="range" id="nailSize" min="1" max="8" value="3" step="0.5">
  </div>

  <div class="control-group">
    <label>Pattern</label>
    <select id="pattern">
      <option value="mixed">Mixed (Border + Through)</option>
      <option value="border">Border Only</option>
      <option value="through">Through Only</option>
      <option value="center-out">Center Outward</option>
      <option value="corners">Corner Bursts</option>
    </select>
  </div>

  <div class="control-group">
    <label>Color Palette</label>
    <select id="palette">
      <option value="neon">Neon Electric</option>
      <option value="sunset">Sunset Blaze</option>
      <option value="ocean">Deep Ocean</option>
      <option value="aurora">Aurora Borealis</option>
      <option value="candy">Candy Pop</option>
      <option value="forest">Emerald Forest</option>
      <option value="fire">Fire & Ice</option>
      <option value="rainbow">Full Spectrum</option>
    </select>
    <div class="color-scheme-preview" id="palettePreview"></div>
  </div>

  <div class="control-group">
    <label>Background</label>
    <select id="bgColor">
      <option value="black">Black</option>
      <option value="dark">Dark Gray</option>
      <option value="navy">Deep Navy</option>
      <option value="white">White</option>
    </select>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button id="generateBtn" style="flex:1">Generate</button>
  </div>
  <div class="btn-row">
    <button class="secondary" id="saveBtn" style="flex:1">Save PNG</button>
  </div>
</div>

<div id="canvas-container"></div>

<script>
const palettes = {
  neon:    [[255,0,120],[0,255,200],[120,0,255],[255,255,0],[0,180,255],[255,80,0]],
  sunset:  [[255,50,50],[255,120,0],[255,200,0],[255,80,120],[200,0,80],[255,160,60]],
  ocean:   [[0,100,255],[0,200,220],[0,255,180],[80,0,200],[0,150,255],[100,220,255]],
  aurora:  [[0,255,100],[0,200,255],[120,0,255],[255,0,200],[0,255,200],[200,100,255]],
  candy:   [[255,100,200],[100,200,255],[255,200,100],[200,100,255],[100,255,200],[255,150,150]],
  forest:  [[0,200,80],[100,255,0],[0,150,100],[200,255,0],[0,100,60],[50,200,50]],
  fire:    [[255,0,0],[255,100,0],[255,200,0],[0,150,255],[0,200,255],[255,50,50]],
  rainbow: [[255,0,0],[255,150,0],[255,255,0],[0,255,0],[0,100,255],[150,0,255]]
};

const bgs = {
  black: [10, 10, 12],
  dark:  [30, 30, 35],
  navy:  [10, 15, 35],
  white: [245, 245, 240]
};

let strings = [];
let nails = [];
let cw, ch, cols, rows;
let margin = 40;

function setup() {
  cw = int(document.getElementById('canvasW').value);
  ch = int(document.getElementById('canvasH').value);
  let cnv = createCanvas(cw, ch, WEBGL);
  cnv.parent('canvas-container');
  pixelDensity(2);
  generateArt();
}

function generateArt() {
  cw = int(document.getElementById('canvasW').value);
  ch = int(document.getElementById('canvasH').value);
  cols = int(document.getElementById('gridCols').value);
  rows = int(document.getElementById('gridRows').value);

  resizeCanvas(cw, ch);

  // Build nail grid
  nails = [];
  let spacingX = (cw - margin * 2) / (cols - 1);
  let spacingY = (ch - margin * 2) / (rows - 1);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      nails.push({
        x: margin + c * spacingX - cw / 2,
        y: margin + r * spacingY - ch / 2,
        col: c,
        row: r,
        isBorder: r === 0 || r === rows - 1 || c === 0 || c === cols - 1
      });
    }
  }

  // Generate strings
  strings = [];
  let count = int(document.getElementById('stringCount').value);
  let patternType = document.getElementById('pattern').value;
  let pal = palettes[document.getElementById('palette').value];

  for (let i = 0; i < count; i++) {
    let path = generatePath(patternType, pal);
    if (path.length >= 2) {
      strings.push(path);
    }
  }

  redraw();
}

function getNail(col, row) {
  if (col < 0 || col >= cols || row < 0 || row >= rows) return null;
  return nails[row * cols + col];
}

function generatePath(patternType, pal) {
  let path = [];
  let startNail;
  let maxSegments = int(random(3, 20));

  // Choose starting nail based on pattern
  switch (patternType) {
    case 'border':
      startNail = randomBorderNail();
      break;
    case 'through':
      startNail = randomInnerNail();
      if (!startNail) startNail = randomNail();
      break;
    case 'center-out':
      startNail = randomCenterNail();
      break;
    case 'corners':
      startNail = randomCornerNail();
      break;
    case 'mixed':
    default:
      if (random() < 0.5) startNail = randomBorderNail();
      else startNail = randomNail();
      break;
  }

  if (!startNail) return path;

  let currentCol = startNail.col;
  let currentRow = startNail.row;
  let colorIdx = int(random(pal.length));

  path.push({
    nail: startNail,
    color: pal[colorIdx]
  });

  for (let s = 0; s < maxSegments; s++) {
    // Choose direction: horizontal or vertical
    let horizontal = random() < 0.5;
    let target;

    if (horizontal) {
      // Pick a different column in same row
      let targetCol = pickTarget(currentCol, cols, patternType);
      if (targetCol === currentCol) continue;
      target = getNail(targetCol, currentRow);
      if (target) currentCol = targetCol;
    } else {
      // Pick a different row in same column
      let targetRow = pickTarget(currentRow, rows, patternType);
      if (targetRow === currentRow) continue;
      target = getNail(currentCol, targetRow);
      if (target) currentRow = targetRow;
    }

    if (target) {
      colorIdx = (colorIdx + int(random(1, pal.length))) % pal.length;
      path.push({
        nail: target,
        color: pal[colorIdx]
      });
    }
  }

  return path;
}

function pickTarget(current, maxVal, patternType) {
  if (patternType === 'border') {
    // Jump to opposite border or stay on border
    return random() < 0.5 ? 0 : maxVal - 1;
  } else if (patternType === 'center-out') {
    // Bias outward
    let center = int(maxVal / 2);
    let offset = int(random(1, maxVal / 2));
    return random() < 0.5 ? min(center + offset, maxVal - 1) : max(center - offset, 0);
  } else if (patternType === 'corners') {
    // Jump to edges
    let choices = [0, maxVal - 1, int(maxVal / 2)];
    return choices[int(random(choices.length))];
  } else {
    // Random
    let t = int(random(maxVal));
    // Avoid landing on same spot
    let attempts = 0;
    while (t === current && attempts < 10) {
      t = int(random(maxVal));
      attempts++;
    }
    return t;
  }
}

function randomBorderNail() {
  let borderNails = nails.filter(n => n.isBorder);
  return borderNails[int(random(borderNails.length))];
}

function randomInnerNail() {
  let inner = nails.filter(n => !n.isBorder);
  if (inner.length === 0) return null;
  return inner[int(random(inner.length))];
}

function randomCenterNail() {
  let cx = int(cols / 2);
  let cy = int(rows / 2);
  let r = int(random(-2, 3));
  let c = int(random(-2, 3));
  let nail = getNail(constrain(cx + c, 0, cols - 1), constrain(cy + r, 0, rows - 1));
  return nail || nails[int(random(nails.length))];
}

function randomCornerNail() {
  let corners = [
    getNail(0, 0),
    getNail(cols - 1, 0),
    getNail(0, rows - 1),
    getNail(cols - 1, rows - 1)
  ];
  // Also include nearby nails
  let area = int(random(0, 4));
  let corner = corners[area];
  let offset = int(random(0, 4));
  let nc = constrain(corner.col + (area % 2 === 0 ? offset : -offset), 0, cols - 1);
  let nr = constrain(corner.row + (area < 2 ? offset : -offset), 0, rows - 1);
  return getNail(nc, nr) || corner;
}

function randomNail() {
  return nails[int(random(nails.length))];
}

function draw() {
  let bg = bgs[document.getElementById('bgColor').value] || bgs.black;
  background(bg[0], bg[1], bg[2]);

  let opacityVal = float(document.getElementById('opacity').value) / 100 * 255;
  let sw = float(document.getElementById('strokeW').value);
  let ns = float(document.getElementById('nailSize').value);
  let bgKey = document.getElementById('bgColor').value;
  let nailColor = bgKey === 'white' ? [80, 80, 80] : [180, 180, 180];

  // Draw strings
  for (let s of strings) {
    for (let i = 0; i < s.length - 1; i++) {
      let from = s[i];
      let to = s[i + 1];
      let col = to.color;

      stroke(col[0], col[1], col[2], opacityVal);
      strokeWeight(sw);
      line(from.nail.x, from.nail.y, 0, to.nail.x, to.nail.y, 0);
    }
  }

  // Draw nails
  noStroke();
  fill(nailColor[0], nailColor[1], nailColor[2], 200);
  for (let nail of nails) {
    push();
    translate(nail.x, nail.y, 1);
    circle(0, 0, ns);
    pop();
  }

  noLoop();
}

// UI bindings
function bindSlider(id, displayId, callback) {
  let el = document.getElementById(id);
  let disp = document.getElementById(displayId);
  el.addEventListener('input', () => {
    disp.textContent = el.value;
    if (callback) callback();
  });
}

bindSlider('canvasW', 'wVal');
bindSlider('canvasH', 'hVal');
bindSlider('gridCols', 'colVal');
bindSlider('gridRows', 'rowVal');
bindSlider('stringCount', 'strVal');
bindSlider('opacity', 'opVal', () => { loop(); });
bindSlider('strokeW', 'swVal', () => { loop(); });
bindSlider('nailSize', 'nsVal', () => { loop(); });

document.getElementById('bgColor').addEventListener('change', () => { loop(); });

document.getElementById('generateBtn').addEventListener('click', generateArt);

document.getElementById('saveBtn').addEventListener('click', () => {
  saveCanvas('string-art', 'png');
});

document.getElementById('palette').addEventListener('change', updatePalettePreview);

function updatePalettePreview() {
  let palName = document.getElementById('palette').value;
  let pal = palettes[palName];
  let container = document.getElementById('palettePreview');
  container.innerHTML = '';
  for (let c of pal) {
    let dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = `rgb(${c[0]},${c[1]},${c[2]})`;
    container.appendChild(dot);
  }
}

updatePalettePreview();
</script>

</body>
</html>
