    :root {
      --black:   #0a0a0a;
      --off:     #f0ede6;
      --dim:     #666660;
      --rule:    #1e1e1e;
      --accent:  #c8a882;
      --border:  #2a2a2a;
      --bright:  #f0f0f0;
      --surface: #111;
    }
    body { background: var(--black); color: var(--off); font-family: 'IBM Plex Mono', monospace; font-weight: 300; min-height: 100vh; }

    nav { display: flex; align-items: stretch; padding: 0 40px; border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 11px; font-weight: 500; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); text-decoration: none; padding: 22px 32px 22px 0; margin-right: 8px; border-right: 1px solid var(--border); }
    .nav-links { display: flex; align-items: stretch; }
    .nav-links a { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); text-decoration: none; padding: 22px 20px; transition: color .15s; display: flex; align-items: center; }
    .nav-links a:hover { color: var(--bright); }
    .nav-links a.active { color: var(--accent); border-bottom: 1px solid var(--accent); margin-bottom: -1px; }

    header { max-width: 1100px; margin: 0 auto; padding: 56px 48px 40px; border-bottom: 1px solid var(--rule); }
    .kicker { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--dim); margin-bottom: 18px; }
    h1 { font-family: Georgia, serif; font-size: clamp(40px,6vw,72px); font-weight: 300; line-height: 1; letter-spacing: -.02em; margin-bottom: 20px; }
    h1 em { font-style: italic; color: var(--accent); }
    .lede { font-size: 13px; color: rgba(240,237,230,.5); line-height: 1.8; max-width: 560px; }

    .controls { max-width: 1100px; margin: 0 auto; padding: 18px 48px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ctrl-label { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-right: 4px; }
    .ctrl-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--dim); padding: 5px 13px; cursor: pointer; transition: all .15s; }
    .ctrl-btn:hover { border-color: var(--dim); color: var(--off); }
    .ctrl-btn.active { border-color: var(--accent); color: var(--accent); }
    #search { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: transparent; border: 1px solid var(--border); color: var(--off); padding: 5px 12px; outline: none; width: 200px; transition: border-color .15s; margin-left: auto; }
    #search::placeholder { color: var(--dim); }
    #search:focus { border-color: var(--accent); }

    .stats { max-width: 1100px; margin: 0 auto; padding: 12px 48px; font-size: 10px; letter-spacing: .1em; color: var(--dim); border-bottom: 1px solid var(--rule); }
    .stats span { color: var(--off); }

    .series-list { max-width: 1100px; margin: 0 auto; padding: 0 48px 80px; }

    .series-block { border-bottom: 1px solid var(--rule); }
    .series-header {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 0; cursor: pointer;
      user-select: none; transition: background .1s;
    }
    .series-header:hover .series-name { color: var(--accent); }
    .series-toggle { font-size: 11px; color: var(--dim); width: 16px; flex-shrink: 0; transition: transform .2s; }
    .series-block.open .series-toggle { transform: rotate(90deg); }
    .series-name { font-size: 15px; font-weight: 400; color: var(--off); flex: 1; }
    .series-count { font-size: 10px; letter-spacing: .12em; color: var(--dim); }
    .series-badge { font-size: 8px; letter-spacing: .1em; text-transform: uppercase; border: 1px solid rgba(200,168,130,.4); color: var(--accent); padding: 2px 7px; }

    .series-files { display: none; padding-bottom: 8px; }
    .series-block.open .series-files { display: block; }

    .file-row {
      display: grid; grid-template-columns: 1fr 280px 80px;
      gap: 12px; align-items: center;
      padding: 10px 0 10px 32px;
      border-top: 1px solid var(--rule);
      cursor: pointer; transition: background .1s;
    }
    .file-row:hover { background: var(--surface); }
    .file-row.is-version { opacity: .4; }
    .file-row.is-version:hover { opacity: 1; }
    .file-title { font-size: 12px; color: var(--off); }
    .file-title a { color: inherit; text-decoration: none; }
    .file-title a:hover { color: var(--accent); }
    .file-name { font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-action { text-align: right; }
    .open-link { font-size: 10px; color: var(--dim); text-decoration: none; padding: 4px 9px; border: 1px solid var(--rule); transition: all .15s; white-space: nowrap; }
    .open-link:hover { border-color: var(--accent); color: var(--accent); }

    .file-row.hidden { display: none; }
    .series-block.all-hidden { display: none; }

    footer { border-top: 1px solid var(--rule); padding: 22px 48px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    footer span { font-size: 10px; color: var(--dim); letter-spacing: .08em; }
  </style>
</head>

let currentFilter = 'all';
let currentSearch = '';

function build() {
  const container = document.getElementById('series-list');
  container.innerHTML = '';

  let totalFiles = 0;
  let visibleFiles = 0;
  let visibleSeries = 0;

  SERIES.forEach((s, si) => {
    const block = document.createElement('div');
    block.className = 'series-block';
    block.id = 'series-' + si;

    const q = currentSearch.toLowerCase();

    let filesHTML = '';
    let fileCount = 0;
    let visibleCount = 0;

    s.files.forEach(f => {
      totalFiles++;
      let show = true;
      if (currentFilter === 'works' && f.version) show = false;
      if (currentFilter === 'versions' && !f.version) show = false;
      if (q && !f.title.toLowerCase().includes(q) && !f.name.toLowerCase().includes(q)) show = false;

      if (show) { visibleCount++; visibleFiles++; }

      filesHTML += `<div class="file-row${f.version ? ' is-version' : ''}${!show ? ' hidden' : ''}" onclick="if(event.target.tagName!=='A') window.open('${f.name}','_blank')">
        <div class="file-title"><a href="${f.name}" target="_blank">${f.title}</a></div>
        <div class="file-name">${f.name}</div>
        <div class="file-action"><a class="open-link" href="${f.name}" target="_blank">Open ↗</a></div>
      </div>`;
      fileCount++;
    });

    const allHidden = visibleCount === 0;
    if (allHidden) block.classList.add('all-hidden');
    else visibleSeries++;

    block.innerHTML = `
      <div class="series-header" onclick="toggle(${si})">
        <span class="series-toggle">▶</span>
        <span class="series-name">${s.name}</span>
        ${s.installation ? '<span class="series-badge">installation</span>' : ''}
        <span class="series-count">${visibleCount} of ${fileCount}</span>
      </div>
      <div class="series-files">${filesHTML}</div>
    `;

    container.appendChild(block);
  });

  document.getElementById('stat-series').textContent = visibleSeries;
  document.getElementById('stat-files').textContent = visibleFiles;
  document.getElementById('footer-count').textContent = `${SERIES.length} series · ${totalFiles} total files`;

  // Auto-expand if searching
  if (currentSearch) expandAll();
}

function toggle(si) {
  const block = document.getElementById('series-' + si);
  block.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.series-block:not(.all-hidden)').forEach(b => b.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.series-block').forEach(b => b.classList.remove('open'));
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ctrl-btn').forEach(b => {
    if (['All','Works only','Versions'].some(t => b.textContent === t)) b.classList.remove('active');
  });
  btn.classList.add('active');
  build();
}

function doSearch(v) {
  currentSearch = v;
  build();
}

build();
</script>
</body>
</html>
