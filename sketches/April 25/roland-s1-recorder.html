<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roland S-1 USB Recorder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    h1 {
      margin-bottom: 0.25rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.75rem 0;
      align-items: center;
    }
    button, select {
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
    }
    #status {
      margin: 0.75rem 0;
      padding: 0.6rem;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 0.4rem;
    }
    #meterWrap {
      height: 12px;
      background: #ddd;
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      max-width: 480px;
    }
    #meterBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #43a047, #fdd835, #e53935);
      transition: width 0.05s linear;
    }
    audio {
      width: 100%;
      margin-top: 0.75rem;
    }
    .hint {
      font-size: 0.9rem;
      color: #444;
    }
    .ok {
      color: #0f6d2a;
    }
  </style>
</head>
<body>
  <h1>Roland S-1 USB Recorder</h1>
  <p class="hint">
    Connect Roland S-1 via USB and set it as an audio interface on your computer.
  </p>

  <div class="row">
    <button id="initBtn">1) Enable Audio + Scan Inputs</button>
    <button id="forcePermissionBtn">Force Permission Prompt</button>
    <button id="pickRolandBtn">Auto-select Roland S-1</button>
  </div>

  <div class="row">
    <label for="deviceSelect">Input Device:</label>
    <select id="deviceSelect"></select>
    <button id="connectBtn">2) Connect Input</button>
    <button id="connectDefaultBtn">Connect Default Input (OS)</button>
    <button id="rescanBtn">Rescan Devices</button>
  </div>

  <div class="row">
    <button id="recordBtn" disabled>3) Start Recording</button>
    <button id="stopBtn" disabled>Stop</button>
    <a id="downloadLink" href="#" download="roland-s1-recording.webm" style="display:none;">Download Recording</a>
  </div>
  
  <div class="row">
    <label for="stereoMode">Stereo routing:</label>
    <select id="stereoMode">
      <option value="native">Native device channels</option>
      <option value="split">True stereo (L=ch1, R=ch2)</option>
      <option value="dualmono">Dual mono (L=R=ch1)</option>
    </select>
  </div>

  <div class="row">
    <strong>Input level:</strong>
    <div id="meterWrap"><div id="meterBar"></div></div>
  </div>

  <div id="status">Status: idle</div>
  <div id="permissionStatus" class="hint">Mic permission: unknown</div>
  <pre id="deviceDebug" class="hint"></pre>
  <audio id="playback" controls></audio>

  <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
  <script>
    const initBtn = document.getElementById("initBtn");
    const forcePermissionBtn = document.getElementById("forcePermissionBtn");
    const pickRolandBtn = document.getElementById("pickRolandBtn");
    const connectBtn = document.getElementById("connectBtn");
    const connectDefaultBtn = document.getElementById("connectDefaultBtn");
    const rescanBtn = document.getElementById("rescanBtn");
    const recordBtn = document.getElementById("recordBtn");
    const stopBtn = document.getElementById("stopBtn");
    const deviceSelect = document.getElementById("deviceSelect");
    const stereoMode = document.getElementById("stereoMode");
    const statusEl = document.getElementById("status");
    const playbackEl = document.getElementById("playback");
    const downloadLink = document.getElementById("downloadLink");
    const meterBar = document.getElementById("meterBar");
    const permissionStatusEl = document.getElementById("permissionStatus");
    const deviceDebug = document.getElementById("deviceDebug");

    let analyserNode = null;
    let levelData = null;
    let mediaStream = null;
    let meterTimer = null;
    let audioContext = null;
    let sourceNode = null;
    let recorderDestination = null;
    let splitterNode = null;
    let mergerNode = null;
    let mediaRecorder = null;
    let recordedChunks = [];

    function setStatus(message, isGood = false) {
      statusEl.textContent = "Status: " + message;
      statusEl.className = isGood ? "ok" : "";
    }

    async function updatePermissionStatus() {
      if (!navigator.permissions || !navigator.permissions.query) {
        permissionStatusEl.textContent = "Mic permission: browser does not expose permission state";
        return;
      }
      try {
        const micPerm = await navigator.permissions.query({ name: "microphone" });
        permissionStatusEl.textContent = "Mic permission: " + micPerm.state;
      } catch (_err) {
        permissionStatusEl.textContent = "Mic permission: unavailable";
      }
    }

    async function forcePermissionPrompt() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });
        stream.getTracks().forEach((t) => t.stop());
        await updatePermissionStatus();
        await scanInputDevices();
        setStatus("Microphone access granted. Device labels should now appear.", true);
      } catch (err) {
        await updatePermissionStatus();
        setStatus("Microphone access denied/blocked: " + err.message);
      }
    }

    async function scanInputDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const inputs = devices.filter((d) => d.kind === "audioinput");

      deviceSelect.innerHTML = "";
      if (!inputs.length) {
        const opt = document.createElement("option");
        opt.textContent = "No audio input devices found";
        opt.value = "";
        deviceSelect.appendChild(opt);
        return inputs;
      }

      inputs.forEach((d, index) => {
        const opt = document.createElement("option");
        const label = d.label || "Input " + (index + 1);
        opt.textContent = label;
        opt.value = d.deviceId;
        deviceSelect.appendChild(opt);
      });
      renderDeviceDebug(inputs);
      return inputs;
    }

    function renderDeviceDebug(inputs) {
      if (!inputs.length) {
        deviceDebug.textContent = "Detected inputs: none";
        return;
      }
      const lines = inputs.map((d, i) => {
        const label = d.label || "(no label yet - allow microphone permission)";
        const rolandFlag = /roland|s-1|s1/i.test(label) ? " [ROLAND MATCH]" : "";
        return (
          (i + 1) +
          ". " +
          label +
          rolandFlag +
          "\n   id: " +
          d.deviceId +
          "\n   group: " +
          (d.groupId || "(none)")
        );
      });
      deviceDebug.textContent = "Detected inputs:\n" + lines.join("\n");
    }

    function autoPickRoland() {
      const options = [...deviceSelect.options];
      const rolandOpt = options.find((opt) =>
        /roland|s-1|s1/i.test(opt.textContent)
      );
      if (rolandOpt) {
        deviceSelect.value = rolandOpt.value;
        setStatus("Roland device selected: " + rolandOpt.textContent, true);
      } else {
        setStatus("Roland device not found. Select manually.");
      }
    }

    async function stopExistingInput() {
      if (mediaStream) {
        mediaStream.getTracks().forEach((t) => t.stop());
        mediaStream = null;
      }
      if (meterTimer) {
        clearInterval(meterTimer);
        meterTimer = null;
      }
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = null;
      }
      if (splitterNode) {
        splitterNode.disconnect();
        splitterNode = null;
      }
      if (mergerNode) {
        mergerNode.disconnect();
        mergerNode = null;
      }
      recorderDestination = null;
      if (analyserNode) {
        analyserNode.disconnect();
        analyserNode = null;
      }
      levelData = null;
      mediaRecorder = null;
      recordedChunks = [];
    }

    async function connectSelectedInput() {
      const deviceId = deviceSelect.value;
      if (!deviceId) {
        setStatus("No input device selected.");
        return;
      }

      await stopExistingInput();

      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          deviceId: { exact: deviceId },
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      audioContext = Tone.getContext().rawContext;
      if (audioContext.state !== "running") {
        await audioContext.resume();
      }
      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      analyserNode = audioContext.createAnalyser();
      analyserNode.fftSize = 1024;
      levelData = new Float32Array(analyserNode.fftSize);

      sourceNode.connect(analyserNode);
      buildRecorderGraph();

      setStatus("Connected input: " + deviceSelect.selectedOptions[0].textContent, true);
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      startMeterUpdates();
    }

    async function connectDefaultInput() {
      await stopExistingInput();

      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      audioContext = Tone.getContext().rawContext;
      if (audioContext.state !== "running") {
        await audioContext.resume();
      }

      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      analyserNode = audioContext.createAnalyser();
      analyserNode.fftSize = 1024;
      levelData = new Float32Array(analyserNode.fftSize);

      sourceNode.connect(analyserNode);
      buildRecorderGraph();

      setStatus("Connected default OS input. If macOS input is S-1, recording uses S-1.", true);
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      startMeterUpdates();
    }

    function startMeterUpdates() {
      if (meterTimer) clearInterval(meterTimer);
      meterTimer = setInterval(() => {
        if (!analyserNode || !levelData) return;
        analyserNode.getFloatTimeDomainData(levelData);
        let sum = 0;
        for (let i = 0; i < levelData.length; i++) {
          const x = levelData[i];
          sum += x * x;
        }
        const rms = Math.sqrt(sum / levelData.length);
        const normalized = Math.min(1, rms * 8);
        meterBar.style.width = Math.round(normalized * 100) + "%";
      }, 50);
    }

    function startRecording() {
      if (!mediaStream) {
        setStatus("No input stream connected.");
        return;
      }
      if (!window.MediaRecorder) {
        setStatus("MediaRecorder is not supported in this browser.");
        return;
      }

      const mimeCandidates = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4",
        "audio/ogg;codecs=opus",
        "audio/ogg"
      ];
      let selectedMime = "";
      for (const m of mimeCandidates) {
        if (MediaRecorder.isTypeSupported(m)) {
          selectedMime = m;
          break;
        }
      }

      recordedChunks = [];
      const captureStream = (recorderDestination && recorderDestination.stream) || mediaStream;
      mediaRecorder = selectedMime
        ? new MediaRecorder(captureStream, { mimeType: selectedMime })
        : new MediaRecorder(captureStream);

      mediaRecorder.ondataavailable = (evt) => {
        if (evt.data && evt.data.size > 0) {
          recordedChunks.push(evt.data);
        }
      };

      mediaRecorder.onstop = () => {
        const recordedType = mediaRecorder.mimeType || "audio/webm";
        const blob = new Blob(recordedChunks, { type: recordedType });
        const url = URL.createObjectURL(blob);
        playbackEl.src = url;
        downloadLink.href = url;
        downloadLink.download = "roland-s1-recording." + extensionFromMime(recordedType);
        downloadLink.style.display = "inline-block";
        setStatus("Recording complete. Ready to play/download.", true);
        recordBtn.disabled = false;
        stopBtn.disabled = true;
      };

      mediaRecorder.start();
      setStatus("Recording...");
      recordBtn.disabled = true;
      stopBtn.disabled = false;
    }

    function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state !== "recording") return;
      mediaRecorder.stop();
    }

    function extensionFromMime(mime) {
      const normalized = (mime || "").toLowerCase();
      if (normalized.includes("ogg")) return "ogg";
      if (normalized.includes("mp4")) return "m4a";
      if (normalized.includes("wav")) return "wav";
      if (normalized.includes("webm")) return "webm";
      return "webm";
    }

    function buildRecorderGraph() {
      if (!audioContext || !sourceNode) return;

      if (splitterNode) {
        splitterNode.disconnect();
        splitterNode = null;
      }
      if (mergerNode) {
        mergerNode.disconnect();
        mergerNode = null;
      }

      recorderDestination = audioContext.createMediaStreamDestination();
      const mode = stereoMode.value;

      if (mode === "native") {
        sourceNode.connect(recorderDestination);
        return;
      }

      splitterNode = audioContext.createChannelSplitter(2);
      mergerNode = audioContext.createChannelMerger(2);
      sourceNode.connect(splitterNode);

      if (mode === "split") {
        splitterNode.connect(mergerNode, 0, 0);
        splitterNode.connect(mergerNode, 1, 1);
      } else {
        splitterNode.connect(mergerNode, 0, 0);
        splitterNode.connect(mergerNode, 0, 1);
      }

      mergerNode.connect(recorderDestination);
    }

    initBtn.addEventListener("click", async () => {
      try {
        await Tone.start();
        // First getUserMedia call unlocks device labels in many browsers.
        const warmup = await navigator.mediaDevices.getUserMedia({ audio: true });
        warmup.getTracks().forEach((t) => t.stop());
        await updatePermissionStatus();
        await scanInputDevices();
        setStatus("Audio enabled. Select Roland and connect input.", true);
      } catch (err) {
        await updatePermissionStatus();
        setStatus("Audio init failed: " + err.message);
      }
    });

    forcePermissionBtn.addEventListener("click", forcePermissionPrompt);
    pickRolandBtn.addEventListener("click", autoPickRoland);
    rescanBtn.addEventListener("click", async () => {
      try {
        await scanInputDevices();
        await updatePermissionStatus();
        setStatus("Device list refreshed.");
      } catch (err) {
        setStatus("Rescan failed: " + err.message);
      }
    });
    connectBtn.addEventListener("click", async () => {
      try {
        await connectSelectedInput();
      } catch (err) {
        setStatus("Failed to connect input: " + err.message);
      }
    });
    connectDefaultBtn.addEventListener("click", async () => {
      try {
        await connectDefaultInput();
      } catch (err) {
        setStatus("Failed to connect default input: " + err.message);
      }
    });
    stereoMode.addEventListener("change", () => {
      if (sourceNode && audioContext) {
        buildRecorderGraph();
        setStatus("Stereo routing updated. Record a new take to hear it.", true);
      }
    });
    recordBtn.addEventListener("click", startRecording);
    stopBtn.addEventListener("click", stopRecording);

    window.addEventListener("beforeunload", () => {
      stopExistingInput();
    });

    updatePermissionStatus();
  </script>
</body>
</html>
