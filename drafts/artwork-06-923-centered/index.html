<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>923 centered — Soft gradient planes (WEBGL) — draft</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    /* Center the sketch surface in the viewport */
    canvas {
      display: block;
      flex-shrink: 0;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    }
    #controls {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    #newSeed {
      padding: 8px 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
    }
    #newSeed:hover { background: #f5f5f5; }
    #seedDisplay { color: #eee; user-select: all; }
    #controls button.secondary { background: #333; color: #eee; border-color: #555; }
    #controls button.secondary:hover { background: #444; }
  </style>
</head>
<body>

  <div id="controls">
    <button type="button" id="newSeed">New seed</button>
    <button type="button" id="pauseBtn" class="secondary">Pause</button>
    <button type="button" id="saveBtn" class="secondary">Save PNG</button>
    <span id="seedDisplay"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <script>
    let colors = [];
    let shapes = [];  // Store the shapes' parameters
    let currentSeed = 0;
    let paused = false;
    let holdFrame = 0;

    // initial load: fixed number, or null for random
    const manualSeed = 923000001;

    // Supersampling: 2 is mild; 4 is sharp on Retina; 5–6 for max crispness (bigger GPU buffer, slower).
    const PIXEL_DENSITY = 4;

    function buildShapes() {
      shapes = [];
      randomSeed(currentSeed);
      console.log("Seed:", currentSeed);
      const el = document.getElementById("seedDisplay");
      if (el) el.textContent = "Seed: " + currentSeed;

      for (let j = 0; j < 6; j++) {
        let w = random(30, 820);
        let h = random(30, 820);

        shapes.push({
          w,
          h,
          colorSet: random(colors),

          baseA1: 30,
          baseA2: 30,
          amp: random(10, 22),
          speed: random(0.004, 0.012),
          phase: random(TWO_PI)
        });
      }
    }

    function setup() {
      const fromUrl = new URLSearchParams(window.location.search).get("seed");
      if (fromUrl !== null && fromUrl !== "") {
        const n = parseInt(fromUrl, 10);
        if (!Number.isNaN(n)) currentSeed = n;
        else currentSeed = (manualSeed !== null) ? manualSeed : floor(random(1_000_000_000));
      } else {
        currentSeed = (manualSeed !== null)
          ? manualSeed
          : floor(random(1_000_000_000));
      }

      pixelDensity(PIXEL_DENSITY);
      createCanvas(1000, 1000, WEBGL);
      colorMode(HSB, 360, 100, 100, 100); // alpha max = 100

      colors = [
        [color(0, 100, 100, 30), color(45, 100, 100, 30)],     // Red → Yellow
        [color(180, 100, 100, 30), color(240, 100, 100, 30)],  // Cyan → Blue
        [color(300, 100, 100, 30), color(60, 100, 100, 30)]    // Magenta → Yellow
      ];

      buildShapes();

      document.getElementById("newSeed").addEventListener("click", () => {
        currentSeed = Math.floor(Math.random() * 1_000_000_000);
        buildShapes();
      });

      document.getElementById("pauseBtn").addEventListener("click", () => {
        paused = !paused;
        holdFrame = frameCount;
        document.getElementById("pauseBtn").textContent = paused ? "Resume" : "Pause";
      });

      document.getElementById("saveBtn").addEventListener("click", () => {
        saveCanvas("923_centered_" + currentSeed, "png");
      });
    }

    function draw() {
      background(255);

      for (let i = 0; i < shapes.length; i++) {
        let shape = shapes[i];

        // Per-layer "breathing" alpha: 0..1..0 (smooth); Pause freezes for clean still export
        let fc = paused ? holdFrame : frameCount;
        let t = fc * shape.speed + shape.phase;
        let breathe01 = 0.5 + 0.5 * sin(t);            // 0..1
        let a = shape.baseA1 + shape.amp * breathe01;  // base..base+amp

        let c1 = shape.colorSet[0];
        let c2 = shape.colorSet[1];

        // Keep the exact same colors; only override alpha per layer
        let c1b = color(hue(c1), saturation(c1), brightness(c1), a);
        let c2b = color(hue(c2), saturation(c2), brightness(c2), a);

        drawSoftGradientPlane(0, 0, shape.w, shape.h, c1b, c2b);
      }
    }

    // WEBGL origin is canvas center; translate places the quad center at (x,y) in plane space
    function drawSoftGradientPlane(x, y, w, h, c1, c2) {
      push();
      translate(x, y, 0);
      noStroke();
      beginShape();
      fill(c1);
      vertex(-w / 2, -h / 2, 0);
      fill(c2);
      vertex(w / 2, -h / 2, 0);
      vertex(w / 2,  h / 2, 0);
      vertex(-w / 2,  h / 2, 0);
      endShape(CLOSE);
      pop();
    }
  </script>
</body>
</html>
