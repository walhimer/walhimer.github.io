<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Long Narrow Room</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #e8e8ec; }
    canvas { display: block; }
    #seed-hud {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 2;
      font: 12px/1.3 system-ui, sans-serif;
      color: #3a3a44;
      letter-spacing: 0.04em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="seed-hud" aria-hidden="true"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    (function setSeedHud() {
      var el = document.getElementById("seed-hud");
      if (!el) return;
      try {
        var raw = (new URLSearchParams(window.location.search || "").get("seed") || "").trim();
        if (!raw) return;
        if (/^[0-9a-fA-F]{1,8}$/.test(raw)) {
          el.textContent = "GALLERY · SEED " + ("000000" + raw.toUpperCase()).slice(-6);
        } else {
          el.textContent = "GALLERY · SEED " + raw;
        }
      } catch (e) {}
    })();

    /**
     * Solid room block with a floor-based doorway opening on the +Z face.
     * hx/hy/hz are half-sizes of the room; a = doorway half-width; yTop = doorway top Y.
     */
    function buildRoomWithDoor(hx, hy, hz, a, yTop) {
      const yBot = -hy;
      const positions = [];
      const indices = [];
      const Q = (p0, p1, p2, p3) => {
        const b0 = positions.length / 3;
        positions.push(
          p0[0], p0[1], p0[2],
          p1[0], p1[1], p1[2],
          p2[0], p2[1], p2[2],
          p3[0], p3[1], p3[2]
        );
        indices.push(b0, b0 + 1, b0 + 2, b0, b0 + 2, b0 + 3);
      };

      // Back (full), sides (full), bottom (full) — no ceiling so roof is visible from inside.
      Q([-hx, -hy, -hz], [hx, -hy, -hz], [hx, hy, -hz], [-hx, hy, -hz]);
      Q([-hx, -hy, -hz], [-hx, hy, -hz], [-hx, hy, hz], [-hx, -hy, hz]);
      Q([hx, -hy, -hz], [hx, -hy, hz], [hx, hy, hz], [hx, hy, -hz]);
      Q([-hx, -hy, -hz], [hx, -hy, -hz], [hx, -hy, hz], [-hx, -hy, hz]);

      // +Z front: frame (top strip + left + right). No bottom strip: door meets floor.
      Q([-hx, yTop, hz], [hx, yTop, hz], [hx, hy, hz], [-hx, hy, hz]);
      Q([-hx, yBot, hz], [-a, yBot, hz], [-a, yTop, hz], [-hx, yTop, hz]);
      Q([a, yBot, hz], [hx, yBot, hz], [hx, yTop, hz], [a, yTop, hz]);

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return geo;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe8e8ec);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0xe8e8ec, 1);
    document.body.appendChild(renderer.domElement);

    const roomHalfW = 1.45;
    const roomHalfH = 1.0;
    const roomHalfD = 3.2;
    const doorHalfW = 0.28;
    const doorTopY = 0.25;
    const room = new THREE.Mesh(
      buildRoomWithDoor(roomHalfW, roomHalfH, roomHalfD, doorHalfW, doorTopY),
      new THREE.MeshStandardMaterial({
        color: 0x8a8a96,
        metalness: 0.08,
        roughness: 0.65,
        side: THREE.DoubleSide,
        emissive: 0x1a1a22,
        emissiveIntensity: 0.12
      })
    );
    scene.add(room);

    // Peaked roof running along the room length.
    const roofHalfW = roomHalfW + 0.18;
    const roofHalfD = roomHalfD + 0.12;
    const roofEaveY = roomHalfH + 0.02;
    const roofPeakY = roomHalfH + 1.56;
    const roofShape = new THREE.Shape();
    roofShape.moveTo(-roofHalfW, roofEaveY);
    roofShape.lineTo(0, roofPeakY);
    roofShape.lineTo(roofHalfW, roofEaveY);
    roofShape.lineTo(-roofHalfW, roofEaveY);
    const roofGeo = new THREE.ExtrudeGeometry(roofShape, {
      depth: roofHalfD * 2,
      steps: 1,
      bevelEnabled: false,
      curveSegments: 1
    });
    roofGeo.translate(0, 0, -roofHalfD);
    const roof = new THREE.Mesh(
      roofGeo,
      new THREE.MeshStandardMaterial({
        color: 0x787884,
        metalness: 0.06,
        roughness: 0.75,
        side: THREE.DoubleSide,
        emissive: 0x151520,
        emissiveIntensity: 0.1
      })
    );
    scene.add(roof);


    scene.add(new THREE.AmbientLight(0xffffff, 0.72));
    const hemi = new THREE.HemisphereLight(0xffffff, 0xc8c8d4, 0.55);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 0.85);
    sun.position.set(4, 8, 2);
    scene.add(sun);
    // Fill so interior walls and roof read when the camera is inside (no black cave).
    const innerFill = new THREE.PointLight(0xfff8f0, 0.55, 14, 1.8);
    innerFill.position.set(0, roomHalfH - 0.12, 0);
    scene.add(innerFill);
    const innerFill2 = new THREE.PointLight(0xeef2ff, 0.4, 16, 1.9);
    innerFill2.position.set(0, 0.2, -roomHalfD * 0.55);
    scene.add(innerFill2);
    const innerFill3 = new THREE.PointLight(0xf5f5f5, 0.32, 14, 2);
    innerFill3.position.set(0, -roomHalfH + 0.35, roomHalfD * 0.45);
    scene.add(innerFill3);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 0.2;
    controls.maxDistance = 12;

    const raycaster = new THREE.Raycaster();
    const mouseNdc = new THREE.Vector2();
    const doorPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -roomHalfD); // z = +roomHalfD
    const doorHit = new THREE.Vector3();

    let entering = false;
    let insideRoom = false;
    let enterStart = 0;
    const ENTER_MS = 1100;
    const enterFromPos = new THREE.Vector3();
    const enterFromTarget = new THREE.Vector3();
    const enterToPos = new THREE.Vector3(0, -0.15, -0.2);
    const enterToTarget = new THREE.Vector3(0, -0.1, -0.9);

    function doorwayClicked(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouseNdc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouseNdc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouseNdc, camera);
      if (!raycaster.ray.intersectPlane(doorPlane, doorHit)) return false;
      return (
        doorHit.x >= -doorHalfW &&
        doorHit.x <= doorHalfW &&
        doorHit.y >= -roomHalfH &&
        doorHit.y <= doorTopY
      );
    }

    renderer.domElement.addEventListener("pointerdown", (e) => {
      if (entering) return;
      if (!doorwayClicked(e.clientX, e.clientY)) return;
      entering = true;
      insideRoom = false;
      enterStart = performance.now();
      enterFromPos.copy(camera.position);
      enterFromTarget.copy(controls.target);
      controls.enabled = false;
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function tick() {
      requestAnimationFrame(tick);
      if (entering) {
        const t = Math.min(1, (performance.now() - enterStart) / ENTER_MS);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        camera.position.lerpVectors(enterFromPos, enterToPos, eased);
        controls.target.lerpVectors(enterFromTarget, enterToTarget, eased);
        if (t >= 1) {
          entering = false;
          insideRoom = true;
          controls.enabled = true;
        }
      }
      controls.update();
      if (insideRoom) {
        const pad = 0.08;
        camera.position.x = THREE.MathUtils.clamp(camera.position.x, -roomHalfW + pad, roomHalfW - pad);
        camera.position.y = THREE.MathUtils.clamp(camera.position.y, -roomHalfH + pad, roomHalfH - pad);
        camera.position.z = THREE.MathUtils.clamp(camera.position.z, -roomHalfD + pad, roomHalfD - pad);
      }
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
